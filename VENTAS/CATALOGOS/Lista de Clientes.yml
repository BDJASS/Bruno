  ---

  ## 12. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 13. Observaciones Técnicas

  1. **Fuente de datos:** El servicio recorre directamente la tabla `ListaCte` con `USE-INDEX Idx-Descripcion` para retornar el catálogo ordenado alfabéticamente por descripción.
  2. **Orden alternativo:** Si se requiere ordenar por clave, cambiar a `USE-INDEX Idx-ListaCte` (índice primario único sobre `Id-ListaCte`).
  3. **EMPTY TEMP-TABLE:** Se limpia `ttListaCte` al inicio para evitar acumulación de registros en ejecuciones repetidas dentro de la misma sesión del agente PASOE.
  4. **Prefijo del mensaje de error:** El bloque `CATCH` del programa arma el mensaje con el prefijo `"Error GetListasArt:"` (herencia del programa de listas de artículos); el texto correcto sería `"Error GetListasCliente:"`. No afecta la operación, solo la etiqueta del mensaje.
  5. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.

