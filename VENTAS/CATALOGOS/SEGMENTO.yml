  ---

  ## 12. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 13. Observaciones Técnicas

  1. **Fuente de datos:** El servicio recorre directamente la tabla `Segmento` con `USE-INDEX Idx-Segmento` (índice primario único sobre `Id-Segmento`).
  2. **EMPTY TEMP-TABLE:** Se limpia `ttSegmento` al inicio para evitar acumulación de registros en ejecuciones repetidas dentro de la misma sesión del agente PASOE.
  3. **Uso como catálogo:** El `IdSegmento` devuelto coincide exactamente con el valor esperado por el parámetro `ip-idSegmento` del servicio `GetVentas` (`ventas001erp.p`). Ver `ventas001erp-GetVentas-FiltroSegmento.md`.
  4. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.

