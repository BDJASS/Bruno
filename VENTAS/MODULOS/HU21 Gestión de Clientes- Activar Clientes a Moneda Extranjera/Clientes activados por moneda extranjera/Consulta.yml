  ---

  ## 13. Observaciones Técnicas

  1. **Origen:** versión REST de `cxca0460.p` ("Tabla de Activación de clientes x Moneda permitida para hacer pedidos y facturar", CxC modo carácter). La pantalla original abre con moneda default `3` (dólares) y muestra el browse "Números de cliente con moneda extranjera asignada" — este GET con `IdMoneda=3` regresa exactamente ese listado.
  2. **Uso como validación:** el caso `IdCliente` + `IdMoneda` permite al front preguntar "¿este cliente puede facturar en esta moneda?" sin traer el catálogo completo: 1 registro = sí, 0 = no.
  3. **Clientes huérfanos:** si un `CteMon` apunta a un cliente ya inexistente, el registro se regresa con `RazonSocial` vacía (no se oculta), igual que el browse original que solo muestra la razón social `WHEN AVAILABLE Cliente`.
  4. **Alta y Baja:** ver `ctemoneda-ClienteMonedaAlta.md` (`POST /Ventas/ClienteMoneda/Alta`) y `ctemoneda-ClienteMonedaBaja.md` (`DELETE /Ventas/ClienteMoneda/Baja`).
  5. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
