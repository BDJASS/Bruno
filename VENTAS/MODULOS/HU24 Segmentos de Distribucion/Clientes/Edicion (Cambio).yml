  ---

  ## 13. Observaciones TГ©cnicas

  1. **Origen:** versiГіn REST del flujo principal de `cxcb0220.p` (capturar cliente в†’ capturar segmento nuevo в†’ `Actualiza`). El candado asociado-distribuidor se aplica igual que en la pantalla, que lo valida al capturar el cliente.
  2. **Flujo sugerido para el front:** primero `GET /Ventas/ClienteSegmento/Consulta?IdCliente=N` para mostrar razГіn social y segmento actual (como la pantalla), luego este `PUT` con el segmento nuevo elegido del catГЎlogo.
  3. **Correo y bitГЎcora:** cada cambio manda el correo de aviso a los gerentes vГ­a `programas/correo02_rest.p` (con control de ambiente: en DEV se redirige a los buzones de desarrollo, no llega a los gerentes; no crГ­tico) y graba `CambioCte` Campo `1290` con `ValorOld`/`ValorNuevo` + auditorГ­a REST вЂ” ver detalle en `ctesegmento-ClienteSegmentoAlta.md`. El password Tipo 15 de la pantalla se valida en el front.
  4. **Operaciones relacionadas:** consulta `ctesegmento-ClienteSegmentoConsulta.md`, alta `ctesegmento-ClienteSegmentoAlta.md`, baja `ctesegmento-ClienteSegmentoBaja.md`.
  5. **AutenticaciГіn:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

