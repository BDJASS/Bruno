docs: |
  # Servicio REST вЂ” Clientes por Segmento de DistribuciГіn (Cambio)

  ---

  ## 1. TГ­tulo del Servicio

  **Clientes por Segmento de DistribuciГіn вЂ” Cambio**
  Cambia el segmento de distribuciГіn de un cliente que **ya** tiene uno asignado, a otro segmento **existente**. Aplica el mismo candado asociado-distribuidor de la pantalla.
  Programa servidor: `ctesegmento.p` В· Procedimiento: `cambiaClienteSegmento` | VersiГіn REST de la pantalla `cxcb0220.p` "Cambio de Segmento a Clientes" (modo carГЎcter).

  ---

  ## 2. MГ©todo HTTP

  ```
  PUT
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/ClienteSegmento/Cambio
  ```

  ---

  ## 4. ParГЎmetros de Entrada (Query String)

  > вњ… = Requerido В· вќЊ = Opcional

  **`IdCliente`** В· STRING В· вњ… вЂ” Cliente a cambiar; debe existir y **tener** segmento actual

  **`IdSegmento`** В· STRING В· вњ… вЂ” Nuevo segmento (mayГєsculas); debe existir en `Segmento` y ser **distinto** del actual
  - Para quitar el segmento el front debe usar la baja (`DELETE /Ventas/ClienteSegmento/Baja`), no mandar vacГ­o

  **`IdUser`** В· STRING В· вњ… вЂ” Usuario que ejecuta la operaciГіn (bitГЎcora `CambioCte`, correo y auditorГ­a)

  > El password Tipo 15 que exige la pantalla original se valida en el **front**; el servicio no lo recibe.

  ---

  ## 5. Body

  No aplica. Todos los parГЎmetros viajan por query string.

  ---

  ## 6. Headers

  | Header         | Valor              |
  |----------------|--------------------|
  | `Accept`       | `application/json` |
  | `Content-Type` | `application/json` |

  ---

  ## 7. Ejemplo de Request

  ```
  PUT .../Ventas/ClienteSegmento/Cambio?IdCliente=34561&IdSegmento=DIST02&IdUser=sis10
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Cliente 34561 con segmento DIST02 (anterior: DIST01)."
    }
  }
  ```

  **`IdError`** В· BOOLEAN вЂ” `false` = cambio exitoso; `true` = error controlado (no se modificГі nada)
  **`Respuesta`** В· STRING вЂ” Mensaje con el segmento nuevo y el anterior

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "El cliente 34561 no tiene distribucion asignada."
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `IdUser` vacГ­o | `IdError: true` вЂ” `"Se requiere el usuario (IdUser)."` |
  | `IdCliente` no numГ©rico o inexistente | `IdError: true` вЂ” `"Numero de cliente invalido."` / `"Codigo de Cliente inexistente, intente de nuevo."` |
  | `IdSegmento` vacГ­o | `IdError: true` вЂ” `"Se requiere el nuevo segmento (IdSegmento)."` |
  | `IdSegmento` inexistente | `IdError: true` вЂ” `"No existe este segmento de distribucion, intente de nuevo..."` (mensaje de la pantalla) |
  | Cliente sin segmento actual | `IdError: true` вЂ” `"El cliente <N> no tiene distribucion asignada."` (mensaje amigable, sin referencias tГ©cnicas) |
  | Nuevo segmento igual al actual | `IdError: true` вЂ” `"El cliente <N> ya tiene asignada esa distribucion (<X>)."` |
  | Cliente asociado a un distribuidor (tablas `Asociado` + `DstArt`) | `IdError: true` вЂ” `"...Alta no procede..."` (mismo candado de la pantalla) |
  | Cliente bloqueado por otro proceso | `IdError: true` вЂ” error controlado sin sesiГіn colgada (`NO-WAIT`) |
  | Cambio exitoso | `Cliente.Id-Segmento` actualizado + bitГЎcora `CambioCte` (Campo 1290, guarda valor anterior y nuevo) + correo de aviso a los gerentes + auditorГ­a (operaciГіn `CAMBIO`) |

  ---

  ## 10. Evidencia de EjecuciГіn

  *Pendiente de captura por parte del equipo de QA.*

  ---

