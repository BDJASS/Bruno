docs: |
  # Servicio REST — Clientes por Segmento de Distribución (Consulta)

  ---

  ## 1. Título del Servicio

  **Clientes por Segmento de Distribución — Consulta**
  Consulta principal: se envía el segmento de distribución (`Cliente.Id-Segmento`) y regresa los clientes que lo tienen asignado. También acepta `IdCliente` para consultar el segmento actual de **un** cliente (el lookup que hace la pantalla antes de cambiar el segmento).
  Programa servidor: `ctesegmento.p` · Procedimiento: `leeClientesSegmento` | Versión REST de la pantalla `cxcb0220.p` "Cambio de Segmento a Clientes" (modo carácter).

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/ClienteSegmento/Consulta
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional · Se requiere **al menos uno** de `IdSegmento` / `IdCliente`

  **`IdSegmento`** · STRING · ❌ — Segmento de distribución (se normaliza a mayúsculas); debe existir en `Segmento`. Regresa todos los clientes que lo tienen asignado

  **`IdCliente`** · STRING · ❌ — Cliente específico; regresa ese cliente con su segmento actual (aunque no tenga segmento)
  - Combinado con `IdSegmento` funciona como validación: ¿este cliente tiene este segmento?

  **`IdUser`** · STRING · ✅ — Usuario que consulta; requerido en todas las operaciones del servicio (se usará para la validación de bitácora que se integrará más adelante)

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET .../Ventas/ClienteSegmento/Consulta?IdSegmento=DIST01&IdUser=sis10        (clientes del segmento)
  GET .../Ventas/ClienteSegmento/Consulta?IdCliente=34561&IdUser=sis10          (segmento actual del cliente)
  GET .../Ventas/ClienteSegmento/Consulta?IdSegmento=DIST01&IdCliente=34561&IdUser=sis10   (validación puntual)
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Consulta generada: 2 cliente(s) con el segmento DIST01.",
      "ttClienteSeg": {
        "ttClienteSeg": [
          {
            "IdCliente": 26,
            "RazonSocial": "COMERCIALIZADORA DEL NORTE SA DE CV",
            "Activo": true,
            "IdSegmento": "DIST01",
            "Segmento": "DISTRIBUIDORES ZONA NORTE"
          },
          {
            "IdCliente": 34561,
            "RazonSocial": "JOSE VILLANUEVA TORRES",
            "Activo": true,
            "IdSegmento": "DIST01",
            "Segmento": "DISTRIBUIDORES ZONA NORTE"
          }
        ]
      }
    }
  }
  ```

  ### Campos de `ttClienteSeg` (1 registro por cliente)

  **`IdCliente`** · INT — Clave del cliente
  **`RazonSocial`** · STRING — Razón social del cliente
  **`Activo`** · BOOLEAN — `true` = cliente activo; `false` = inactivo
  **`IdSegmento`** · STRING — Segmento de distribución asignado; vacío si no tiene (solo en lookup por cliente)
  **`Segmento`** · STRING — Descripción del segmento (`Segmento.Descr`); vacía si no tiene o el segmento ya no existe

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "No existe este segmento de distribucion, intente de nuevo...",
    "ttClienteSeg": { "ttClienteSeg": [] }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `IdUser` vacío | `IdError: true` — `"Se requiere el usuario (IdUser)."` |
  | Sin `IdSegmento` ni `IdCliente` | `IdError: true` — se requiere al menos uno |
  | `IdSegmento` inexistente | `IdError: true` — `"No existe este segmento de distribucion, intente de nuevo..."` |
  | `IdCliente` inexistente | `IdError: true` — `"Codigo de Cliente inexistente, intente de nuevo."` (mensaje de la pantalla) |
  | `IdCliente` sin segmento asignado | Consulta OK; el registro regresa con `IdSegmento` vacío y la `Respuesta` lo indica |
  | `IdCliente` + `IdSegmento` y el cliente no lo tiene | Consulta OK; tabla vacía y `Respuesta` lo indica |
  | Segmento sin clientes | Consulta OK; `Respuesta: "Sin clientes con el segmento <X>."` |

  ---

  ## 10. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*

  ---

