  ---

  ## 13. Observaciones Técnicas

  1. **Origen:** versión REST de `cxcb0220.p` ("Cambio de Segmento a Clientes", modo carácter). La pantalla no tiene browse; el listado por segmento es **nuevo** a petición del negocio (consulta principal del módulo). El lookup por `IdCliente` replica lo que la pantalla muestra al capturar el cliente (razón social + segmento actual).
  2. **Rendimiento:** `Cliente.Id-Segmento` no tiene índice, así que el listado por segmento hace un barrido secuencial de `Cliente` por request (con `FIELDS` para lectura mínima) — mismo costo ya conocido del conteo en `segmentodist.p`. El lookup por `IdCliente` es directo por índice primario (inmediato).
  3. **Password vs IdUser:** el password Tipo 15 que exige la pantalla original se valida en el **front** (ningún endpoint del servicio lo recibe). En cambio, `IdUser` sí es requerido en todas las operaciones — se usará para la validación contra otra bitácora que se integrará más adelante sin cambiar el contrato del API.
  4. **Operaciones relacionadas:** alta `ctesegmento-ClienteSegmentoAlta.md`, cambio `ctesegmento-ClienteSegmentoCambio.md`, baja `ctesegmento-ClienteSegmentoBaja.md`. El catálogo de segmentos para el combo del front está en `GET /Ventas/SegmentoDistribucion/Consulta` (o `/Ventas/Catalogo/Segmentos`).
  5. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

