  ---

  ## 13. Observaciones Técnicas

  1. **Origen:** versión REST del browse de `vtaa0251.p` (opción "Excepciones" de la pantalla `vtaa0250.p`), que en la interfaz nueva se maneja como **tab detalle** del segmento. Las columnas `Tipo`, `IdExcepcion` y `Descr` replican el `PostFind` de la pantalla (resolución contra los catálogos `Prov`, `Catego`, `Familia`, `Marca`, `Grupo`).
  2. **Llave del renglón:** el par `IdSegmento + Reng` identifica la excepción en las operaciones de edición y baja; el front debe conservar el `Reng` de cada fila.
  3. **Encabezado del tab:** los datos del segmento (descripción, promedio mínimo, margen general, número de excepciones) se obtienen del GET del maestro `segmentodist-SegmentoConsulta.md` con `IdSegmento` puntual.
  4. **Operaciones relacionadas:** alta `segmentodist-ExcepcionAlta.md`, edición `segmentodist-ExcepcionModifica.md`, baja `segmentodist-ExcepcionBaja.md`.
  5. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

