  ---

  ## 13. Observaciones Técnicas

  1. **Origen:** versión REST de `vtaa0250.p` (browse "Segmentos de distribución", modo carácter). La columna `NumClientes` es **nueva** respecto a la pantalla: se agregó a petición del negocio para ver cuántos clientes tienen asignado cada segmento.
  2. **Costo del conteo de clientes (importante):** la tabla `Cliente` **no tiene índice** por `Id-Segmento` (se revisaron sus 32 índices). Para que el conteo no fuera pesado, el servicio **NO** consulta cliente-por-segmento (eso haría un barrido completo de `Cliente` por cada segmento); en su lugar hace **una sola pasada secuencial** de `Cliente` (con `FIELDS (Id-Segmento)`, lectura mínima) acumulando el conteo de todos los segmentos a la vez. El costo es fijo: un barrido de la tabla por request, sin importar cuántos segmentos existan.
  3. **Escape de rendimiento:** si aun así el barrido resultara lento en producción (depende del tamaño real de `Cliente`), el front puede pedir `CuentaClientes=N` para pintar el grid al instante y pedir el conteo después, o se puede evaluar con el DBA agregar un índice por `Id-Segmento` a `Cliente`, con lo que el conteo sería inmediato.
  4. **`NumExcepciones`:** conteo barato (la tabla `DetSegmento` sí se accede por `Id-Segmento`); sirve para el badge del tab "Excepciones".
  5. **Operaciones relacionadas:** alta `segmentodist-SegmentoAlta.md`, edición `segmentodist-SegmentoModifica.md`, baja `segmentodist-SegmentoBaja.md`; tab de excepciones en `segmentodist-Excepcion*.md`. No confundir con `GET /Ventas/Catalogo/Segmentos` (`ventas-cat-segmento.p`), que es solo el catálogo Id+Descr para combos.
  6. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
