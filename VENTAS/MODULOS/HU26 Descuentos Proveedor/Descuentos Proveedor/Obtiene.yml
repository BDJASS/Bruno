  ---

  ## 14. Observaciones Técnicas

  1. Este `GET` **no recibe `IdUser`** (es solo lectura); las operaciones de escritura (`Crea`, `Actualiza`, `Elimina`, `ActualizaVigencia`) sí lo requieren.
  2. **Mantenimiento:** ver `descprovexpo-DescuentoProveedorCrea.md`, `...Actualiza.md`, `...Elimina.md` y `...ActualizaVigencia.md`.
  3. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

