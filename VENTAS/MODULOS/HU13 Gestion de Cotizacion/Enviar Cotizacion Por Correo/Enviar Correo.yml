docs: |
  # Servicio REST — Envío de Cotización por Correo

  ---

  ## 1. Título del Servicio

  **Enviar Cotización por Correo (EnviarCorreo)**
  Recibe el folio de una cotización, el correo destino y el contenido (HTML) generado en la interfaz, valida y dispara el envío del correo.
  Programa servidor: `cotizaenv.p` · Procedimiento: `envcorreo` | El envío real lo realiza `sisd0500.p`.

  ---

  ## 2. Método HTTP

  ```
  POST
  ```

  > También puede mapearse como `GET` (como en el portal original); se recomienda `POST` porque `pContenido` (HTML) puede ser extenso.

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Cotizacion/Captura/EnviarCorreo
  ```

  > El procedimiento interno es `cotizaenv.p` / `envcorreo`. La ruta amigable se define en el catálogo de servicios del PASOE.

  ---

  ## 4. Parámetros de Entrada

  > ✅ = Requerido · ❌ = Opcional

  **`idCotiza`** · STRING · ✅ — Folio de la cotización. Debe existir y estar **autorizada**
  **`pMail`** · STRING · ✅ — Correo destino. Debe contener `@`
  **`pContenido`** · STRING · ❌ — Cuerpo del correo (HTML) generado en la interfaz

  ---

  ## 5. Body

  Los parámetros son escalares (sin dataset). Según el mapeo del catálogo viajan en Query String (`GET`) o en el body (`POST`).

  ```json
  {
    "idCotiza": "2083417",
    "pMail": "cliente@dominio.com",
    "pContenido": "<html>...cuerpo del correo...</html>"
  }
  ```

  ---

  ## 6. Headers

  | Header         | Valor                |
  |----------------|----------------------|
  | `Accept`       | `application/json`   |
  | `Content-Type` | `application/json`   |

  ---

  ## 7. Ejemplo de Response

  ### Éxito

  ```json
  {
    "IdError": false,
    "Respuesta": "Cotizacion 2083417 enviada por correo a cliente@dominio.com."
  }
  ```

  ### Error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Cotizacion no autorizada, imposible enviar por correo."
  }
  ```

  ---

  ## 8. Validaciones del Servicio

  | Condición | Comportamiento |
  |-----------|----------------|
  | `idCotiza` vacío | `IdError: true` — *"El numero de cotizacion no puede estar vacio."* |
  | `pMail` vacío | `IdError: true` — *"La cuenta de correo electronico no puede estar vacia."* |
  | `pMail` sin `@` | `IdError: true` — *"La cuenta de correo electronico no tiene el formato adecuado."* |
  | Cotización no existe | `IdError: true` — *"La cotizacion indicada no existe."* |
  | Cotización no autorizada | `IdError: true` — *"Cotizacion no autorizada, imposible enviar por correo."* |
  | Error al ejecutar el envío | `IdError: true` — *"Error al enviar la cotizacion por correo: `<detalle>`."* |
  | Envío correcto | `IdError: false` — *"Cotizacion `<folio>` enviada por correo a `<correo>`."* |

  ---

  ## 9. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*

  ---

  ## 10. Fecha de Prueba

  | Ambiente | Fecha         | Ejecutado por |
  |----------|---------------|---------------|
  | DEV      | *(pendiente)* | *(pendiente)* |

  ---

  ## 11. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio ajustado a convención `IdError`/`Respuesta`. Pendiente de prueba formal por QA. |

  ---

  ## 12. Observaciones Técnicas

  1. **Convención `IdError`/`Respuesta`:** el servicio se ajustó para devolver `IdError` (LOGICAL) y `Respuesta` (CHARACTER) en lugar del antiguo `oMensaje`.
  2. **Solo cotizaciones autorizadas:** únicamente se envían cotizaciones con `Cot.Autorizada = true`.
  3. **Envío delegado:** el correo lo dispara `/usr2/adosa/procs/sisd0500.p` (folio, correo, contenido), invocado por **ruta absoluta**. Cualquier error en su ejecución se captura en el `CATCH` y se devuelve en `IdError`/`Respuesta`.
  4. **Limpieza:** se eliminó el include `cotizaenv.i` (definía un temp-table no utilizado), las variables de conexión a AppServer en desuso, el código comentado y los `MESSAGE` de depuración.
  5. **Contenido HTML:** `pContenido` es el cuerpo del correo ya armado por la interfaz; el servidor no lo modifica. Si llega como desconocido (`?`) se trata como cadena vacía.
  6. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
  **Desarrollado por:** SIS10 - JASS
