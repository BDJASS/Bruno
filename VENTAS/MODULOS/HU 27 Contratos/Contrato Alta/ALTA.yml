docs: |
  # Servicio REST â€” Contratos: Alta

  ---

  ## 1. TĂ­tulo del Servicio

  **Contratos â€” Alta**
  Crea el contrato con lo que llega en el **body** (el dataset que devolviĂł la Previa, ya editado: el front solo pudo **quitar** renglones). Nace en estatus **PENDIENTE** (`Activo = NO`); se pone en vigor con la ActivaciĂłn.
  Programa servidor: `contrato.p` Â· Procedimiento: `altaContrato` | VersiĂłn REST de `vtaa0022.p` + `vtaa0027.i`.

  ---

  ## 2. MĂ©todo HTTP

  ```
  POST
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Contratos/Alta
  ```

  ---

  ## 4. ParĂˇmetros de Entrada (Query String)

  > âś… = Requerido Â· âťŚ = Opcional

  **`FechaIni`** Â· DATE (ISO `aaaa-mm-dd`) Â· âťŚ â€” Vigencia inicial (editable); vacĂ­a = `Cot.FecReg`
  **`FechaFin`** Â· DATE (ISO `aaaa-mm-dd`) Â· âťŚ â€” Vigencia final (editable); vacĂ­a = `Cot.FecReg + 60`
  **`Confirmar`** Â· LOGICAL Â· âťŚ â€” `false`/omitido en el primer intento. Si hay artĂ­culos en otro contrato activo, el servicio regresa una confirmaciĂłn y **no crea nada**; el front reenvĂ­a el mismo body con `Confirmar=true` para saltarla
  **`IdUser`** Â· STRING Â· âś… â€” Usuario que crea el contrato (auditorĂ­a)

  ---

  ## 5. Body

  **DATASET `dsContrato`** â€” el que devolviĂł `GET /Ventas/Contratos/Previa`, ya editado (renglones que quedaron). La cabecera `ttContEnc` debe traer al menos **`IdCot`**; opcionalmente **`Activo`** (ver abajo). Cada partida de `ttDetContrato` trae `IdArticulo`, `IdColor`, `IdPres`, `Seq`, `IdMoneda`, `IndicaPre`, `PrecUnit`, `CostoEsp`, `IdMonedaCE`, `CostoCot`, `Descontinuado`.

  > **`Activo`** (LOGICAL, en `ttContEnc`) â€” `false`/omitido = nace **PENDIENTE** (comportamiento por defecto). `true` = nace **ACTIVO** directamente (sin pasar por la activaciĂłn). El campo de texto `Estatus` del body es solo informativo y se **ignora**.

  ```json
  {
    "dsContrato": {
      "ttContEnc": [
        { "IdContrato": 0, "IdCot": "4101355", "Activo": false, "Partidas": 1 }
      ],
      "ttDetContrato": [
        {
          "IdContrato": 0, "Seq": 10, "IdArticulo": "021118",
          "IdColor": 2, "IdPres": 4, "IdMoneda": 0,
          "PrecUnit": 41.4, "IndicaPre": "F",
          "CostoCot": 35.41368, "CostoEsp": 0.0, "IdMonedaCE": 1,
          "Descontinuado": false
        }
      ]
    }
  }
  ```

  > Si el mapeo PASOE espera el nombre del parĂˇmetro por fuera (como en la salida, que anida `dsContrato.dsContrato`), envuĂ©lvelo una vez mĂˇs: `{ "dsContrato": { "dsContrato": { "ttContEnc": [...], "ttDetContrato": [...] } } }`.

  ---

  ## 6. Headers

  | Header         | Valor              |
  |----------------|--------------------|
  | `Accept`       | `application/json` |
  | `Content-Type` | `application/json` |

  ---

  ## 7. Ejemplo de Request

  ```
  POST .../Ventas/Contratos/Alta?FechaIni=2026-07-10&FechaFin=2026-09-08&IdUser=sis10
       (con el DATASET dsContrato en el body)
  ```

  ---

  ## 8. Ejemplo de Response

  ### Alta correcta

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Contrato 2438 generado.",
      "IdContrato": 2438
    }
  }
  ```

  > **`IdContrato`** (INTEGER) â€” folio generado; `0` si hubo error. El front lo usa directo (no necesita parsear `Respuesta`).

  ### Necesita confirmaciĂłn (artĂ­culos en otro contrato activo)

  ```json
  {
    "response": {
      "IdError": true,
      "Respuesta": "Los siguientes articulos ya estan en otro contrato activo del cliente: 021118. Confirme para crear el contrato de todas formas."
    }
  }
  ```
  â†’ El front reenvĂ­a el mismo body agregando `&Confirmar=true` a la URL.

  ---

  ## 9. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `IdUser` vacĂ­o | `"Se requiere el usuario (IdUser)."` |
  | Body sin cabecera | `"No se recibio la cabecera del contrato en el body (dsContrato)."` |
  | Cabecera sin `IdCot` | `"El body no trae la cotizacion (IdCot) en la cabecera."` |
  | Body sin partidas | `"El contrato debe tener al menos un articulo."` |
  | CotizaciĂłn inexistente | `"Cotizacion inexistente, verifique..."` |
  | RenglĂłn del body a TC Real (`IndicaPre = "X"`) | `"El contrato contiene al menos un articulo con precio calculado al TC Real; quitelo para poder crearlo."` |
  | `FechaFin < hoy` / `< FechaIni` | `"Fecha Final menor a Fecha Actual."` / `"...menor a Fecha Inicial."` |
  | Asociado del cliente con contrato activo | `"YA EXISTE EL CONTRATO <n> CON EL ASOCIADO <cliente> <razĂłn social>."` |
  | ArtĂ­culos en otro contrato activo (`Confirmarâ‰ true`) | `"Los siguientes articulos ya estan en otro contrato activo del cliente: <lista>. Confirme para crear el contrato de todas formas."` |
  | Alta correcta | `"Contrato N generado."` + `IdContrato = N` |

  ---

  ## 10. Reglas del proceso (todo desde el body)

  - Se trabaja **solo con los renglones que llegan en el body**; lo que el front quitĂł ya no viene (por eso la validaciĂłn de TC Real es sobre el body).
  - Cada `DetContrato` se crea con los valores del body (no se re-consulta la cotizaciĂłn renglĂłn por renglĂłn).
  - **Cliente:** el de la cotizaciĂłn (`IdCot`); no se recibe como parĂˇmetro.
  - **Descontinuados:** se registran en la auditorĂ­a (no bloquean, igual que la pantalla vigente); ya no se detallan en la `Respuesta`.
  - Folio: tabla `Folio` con `Id-Doc = "CONTRATO"` (con `NO-WAIT` + reintentos). Nace **PENDIENTE** salvo que el body traiga `ttContEnc.Activo = true`, en cuyo caso nace **ACTIVO** (capacidad del front; el carĂˇcter siempre nacĂ­a PENDIENTE).

  ---

  ## 11. Resultado

  | Estado | DescripciĂłn |
  |--------|-------------|
  | âŹł Pendiente prueba | Servicio desarrollado. Pendiente de compilaciĂłn/deploy y QA. |

  ---

  ## 12. Observaciones TĂ©cnicas

  1. AuditorĂ­a: operaciĂłn `ALTA` en `programas/auditoria.p` (mĂłdulo `Contratos`).
  2. Servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

