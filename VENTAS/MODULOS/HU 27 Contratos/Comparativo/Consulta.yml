  ---

  ## 13. Observaciones Técnicas

  1. **Origen:** versión REST de `vtac1210.p` (modo carácter). El reporte carácter imprimía un `.lst`; aquí la **misma información** se devuelve como DATASET (`dsCompara` = cabecera `ttCompEnc` + detalle `ttCompDet`) para que el front la pinte en grid.
  2. **Cruce de partidas:** el renglón nace del cruce de `DetCot` (Tipo = 1) con `DetContrato` por `Id-Articulo` + `Id-Color` + `Id-Pres`, igual que la pantalla. Un artículo que solo está en la cotización trae `PrecContrato = 0`; uno que solo está en el contrato trae `PrecCot = 0` y `Cant = 1`.
  3. **Margen:** se calcula contra `HCosto` (por artículo + proveedor del artículo; si no hay, por artículo) por la equivalencia de la presentación (`ArtPres.Equiv`), tal cual el modo carácter. Si no hay costo (denominador `0`), el margen regresa `null` (`?`) en lugar de provocar un error de división.
  4. **% de variación:** `((PrecCot / PrecContrato) - 1) * 100`; `0` si los precios son iguales; `null` cuando `PrecContrato = 0` (no comparable), replicando el `WHEN l-Porc <> ?` del reporte carácter.
  5. **Auditoría:** `IdUser` es obligatorio y cada consulta se registra vía `programas/auditoria.p` (área `VENTAS`, módulo `Contratos`, programa `vtac1210`, operación `CONSULTA`). No es crítica: si falla, la consulta igual responde.
  6. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

