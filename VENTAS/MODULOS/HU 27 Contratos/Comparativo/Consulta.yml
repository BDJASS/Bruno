docs: |
  # Servicio REST — Comparativo Contrato vs. Cotización

  ---

  ## 1. Título del Servicio

  **Comparativo Contrato vs. Cotización — Consulta**
  Compara, artículo por artículo (color + presentación), los precios y márgenes de un **contrato** contra los de una **cotización**, mostrando el % de variación del precio.
  Programa servidor: `vtac1210.p` · Procedimiento: `GetComparaContratoCot` | Versión REST de `vtac1210.p` "Comparativo de Contrato Vs. Cotización" (modo carácter, FLC 30-ENE-2016).

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/ComparativoContratoCotizacion
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`IdContrato`** · STRING (numérico) · ✅ — Folio del contrato a comparar
  - Ej: `"1520"`

  **`IdCot`** · STRING · ✅ — Folio de la cotización a comparar (se normaliza a mayúsculas)
  - Ej: `"C012345"`

  **`IdUser`** · STRING · ✅ — Usuario que consulta (se registra en la bitácora de auditoría)

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET .../Ventas/ComparativoContratoCotizacion?IdContrato=1520&IdCot=C012345&IdUser=SIS10
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Consulta generada: 3 partida(s) comparadas.",
      "dsCompara": {
        "ttCompEnc": [
          {
            "IdContrato": 1520,
            "IdCot": "C012345",
            "Partidas": 3,
            "ttCompDet": [
              {
                "IdContrato": 1520,
                "IdCot": "C012345",
                "IdArticulo": "100205",
                "Codigo": "100205000101",
                "DescrArt": "LAPIZ ADHESIVO 40 GR",
                "IdColor": 1,
                "Color": "AZUL",
                "IdPres": 1,
                "Presentacion": "PIEZA",
                "Cant": 100.00,
                "PrecCot": 12.50,
                "PrecContrato": 11.80,
                "MargenCot": 25.00,
                "MargenContrato": 18.00,
                "PorcVar": 5.93
              },
              {
                "IdContrato": 1520,
                "IdCot": "C012345",
                "IdArticulo": "100210",
                "Codigo": "100210000001",
                "DescrArt": "MARCADOR PERMANENTE",
                "IdColor": 0,
                "Color": "",
                "IdPres": 1,
                "Presentacion": "CAJA",
                "Cant": 1.00,
                "PrecCot": 0.00,
                "PrecContrato": 45.00,
                "MargenCot": null,
                "MargenContrato": 30.00,
                "PorcVar": -100.00
              }
            ]
          }
        ]
      }
    }
  }
  ```

  ### Campos de `ttCompEnc` (cabecera, 1 registro)

  **`IdContrato`** · INT — Folio del contrato comparado
  **`IdCot`** · STRING — Folio de la cotización comparada
  **`Partidas`** · INT — Número de renglones comparados

  ### Campos de `ttCompDet` (1 registro por artículo + color + presentación)

  **`IdContrato`** · INT — Folio del contrato (llave con la cabecera)
  **`IdCot`** · STRING — Folio de la cotización
  **`IdArticulo`** · STRING — Clave del artículo
  **`Codigo`** · STRING — Código armado `Artículo + Color(9999) + Pres(99)` (igual que el reporte)
  **`DescrArt`** · STRING — Descripción del artículo
  **`IdColor`** · INT — Clave del color (`0` = sin color)
  **`Color`** · STRING — Abreviatura del color
  **`IdPres`** · INT — Clave de la presentación
  **`Presentacion`** · STRING — Descripción de la presentación
  **`Cant`** · DECIMAL — Cantidad de la cotización (`1` en renglones que solo existen en el contrato)
  **`PrecCot`** · DECIMAL — Precio unitario en la cotización (`0` si solo está en el contrato)
  **`PrecContrato`** · DECIMAL — Precio unitario en el contrato (`0` si solo está en la cotización)
  **`MargenCot`** · DECIMAL — Margen sobre costo del precio de la cotización; `null` si no hay costo
  **`MargenContrato`** · DECIMAL — Margen sobre costo del precio del contrato; `null` si no hay costo
  **`PorcVar`** · DECIMAL — % de variación `((PrecCot / PrecContrato) - 1) * 100`; `0` si son iguales; `null` cuando el precio del contrato es `0` (no comparable)

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Contrato inexistente, verifique...",
    "dsCompara": { "ttCompEnc": [] }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `IdUser` vacío | `IdError: true` — `"Se requiere el usuario (IdUser)."` |
  | `IdContrato` no numérico o `<= 0` | `IdError: true` — `"Numero de contrato invalido."` |
  | `IdCot` vacío | `IdError: true` — `"Se requiere la cotizacion (IdCot)."` |
  | `IdContrato` inexistente | `IdError: true` — `"Contrato inexistente, verifique..."` |
  | `IdCot` inexistente | `IdError: true` — `"Cotizacion inexistente, verifique..."` |
  | Sin partidas que comparar | Consulta OK; `Respuesta: "Sin partidas para comparar entre el contrato X y la cotizacion Y."` |

  ---

  ## 10. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*

  ---

