docs: |
  # Servicio REST — Contratos: Edita

  ---

  ## 1. Título del Servicio

  **Contratos — Edita**
  Edita un contrato existente recibiendo en el **body** el dataset `dsContrato` ya modificado por el front (partidas dadas de baja quitadas, `FecFin` y monedas/precios ya ajustados). El servidor calcula qué cambió contra la BD y lo persiste en una transacción.
  Programa servidor: `contrato.p` · Procedimiento: `editaContrato` | Versión REST del guardado `vtaa0027.i` disparado por las opciones de `vtaa0020.i` (Baja `vtaa0024.i`, Fechas `vtaa0025.i`, Moneda `vtaa0026.i`).

  ---

  ## 2. Método HTTP

  ```
  PUT
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Contratos/Edita
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`IdUser`** · STRING · ✅ — Usuario que edita (auditoría)
  **`AutorizaFechaActivo`** · BOOLEAN · ❌ — Permiso para cambiar `FecFin` de un contrato **ACTIVO**. Lo pone el front según el permiso del usuario (equivalente al candado `OLDS`/`ALEX` del carácter). Default `false`
  - `true` = puede cambiar fechas de un activo · `false`/omitido = solo puede si el contrato no está activo

  ---

  ## 5. Body

  **DATASET `dsContrato`** — la cabecera `ttContEnc` debe traer **`IdContrato`** (el contrato a editar) y la **`FecFin`** deseada. Hay **dos modos** según `ttDetContrato`:

  ### Modo A — Solo encabezado (`ttDetContrato` vacío)

  Para editar **solo la fecha** de un contrato con muchas partidas. El detalle **no se toca** (no se borra ni recalcula nada); payload mínimo y sin riesgo de bajas accidentales.

  ```json
  {
    "dsContrato": {
      "ttContEnc": [
        { "IdContrato": 2434, "FecFin": "2026-12-31" }
      ],
      "ttDetContrato": []
    }
  }
  ```

  ### Modo B — Conjunto completo de partidas (`ttDetContrato` con renglones)

  Para bajas y/o cambio de moneda-precio. `ttDetContrato` debe traer **todas las partidas que deben quedar**; las del contrato que **no** vengan se dan de **baja**. `PrecUnit` / `IdMoneda` ajustados si hubo cambio de moneda.

  ```json
  {
    "dsContrato": {
      "ttContEnc": [
        { "IdContrato": 2434, "FecFin": "2026-10-31" }
      ],
      "ttDetContrato": [
        { "IdContrato": 2434, "Seq": 10, "IdArticulo": "021118", "IdColor": 2, "IdPres": 4, "IdMoneda": 0, "PrecUnit": 41.4 }
      ]
    }
  }
  ```

  > ⚠️ En **Modo B**, toda partida existente que no venga en el body **se borra**. Para "solo fecha" usa **Modo A** (detalle vacío).
  > `FecIni` **no es editable** (igual que en `vtaa0025.i`, donde está comentada); aunque venga en el body se conserva la de la BD.
  > Si el mapeo PASOE espera el nombre del parámetro anidado, envuélvelo una vez más: `{ "dsContrato": { "dsContrato": { "ttContEnc": [...], "ttDetContrato": [...] } } }`.

  ---

  ## 6. Headers

  | Header         | Valor              |
  |----------------|--------------------|
  | `Accept`       | `application/json` |
  | `Content-Type` | `application/json` |

  ---

  ## 7. Ejemplo de Request

  ```
  PUT .../Ventas/Contratos/Edita?IdUser=sis10&AutorizaFechaActivo=false
       (con el DATASET dsContrato en el body)
  ```

  ---

  ## 8. Ejemplo de Response

  ### Edición correcta

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Contrato 2438 actualizado."
    }
  }
  ```

  ### Bloqueada (fecha en contrato activo sin permiso)

  ```json
  {
    "response": {
      "IdError": true,
      "Respuesta": "No tiene permiso para modificar las fechas de un contrato activo."
    }
  }
  ```

  ---

  ## 9. Reglas de edición (por estatus)

  > Mismas reglas del modo carácter (`vtaa0024/25/26.i`).

  | Operación | PENDIENTE | ACTIVO | CANCELADO |
  |-----------|-----------|--------|-----------|
  | Baja de partida | ✅ | ✅ (se audita) | ❌ |
  | Cambio de `FecFin` | ✅ | ⚠️ solo con `AutorizaFechaActivo=true` | ❌ |
  | Cambio de moneda / precio | ✅ | ❌ | ❌ |

  - **CANCELADO:** no se puede editar nada.
  - **`FecIni`** no es editable en ninguna operación.
  - **No se pueden AGREGAR partidas:** toda partida del body debe existir ya en el contrato (mismo `IdArticulo`+`IdColor`+`IdPres`).
  - Debe quedar **al menos una partida**.

  ---

  ## 10. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `IdUser` vacío | `"Se requiere el usuario (IdUser)."` |
  | Body sin cabecera | `"No se recibio la cabecera del contrato en el body (dsContrato)."` |
  | `IdContrato` ≤ 0 | `"Numero de contrato invalido."` |
  | Body sin partidas | `"El contrato debe conservar al menos un articulo."` |
  | Contrato en uso por otro proceso | `"El contrato esta siendo usado por otro proceso; intente de nuevo."` |
  | Contrato inexistente | `"No existe folio en archivo de Contratos, favor de verificar."` |
  | Contrato cancelado | `"El contrato esta cancelado y no puede editarse."` |
  | Partida del body que no pertenece al contrato | `"No se pueden agregar articulos a un contrato existente; el articulo <n> no pertenece al contrato."` |
  | `FecFin < hoy` / `< FecIni` | `"Fecha Final menor a Fecha Actual."` / `"Fecha Final menor a Fecha Inicial."` |
  | `FecFin` de un activo sin `AutorizaFechaActivo` | `"No tiene permiso para modificar las fechas de un contrato activo."` |
  | Cambio de moneda/precio en activo | `"El contrato esta activo; no se puede cambiar el tipo de moneda ni el precio."` |
  | Edición correcta | `"Contrato N actualizado."` |

  ---

  ## 11. Reglas del proceso (todo desde el body)

  - **Modo A (detalle vacío):** solo se actualiza el encabezado (`FecFin`); el detalle no se toca.
  - **Modo B (con partidas):** se trabaja **contra la BD comparando con el body**: las partidas que ya no vienen se dan de **baja** (DELETE de `DetContrato`); las que quedan se **actualizan** (`PrecUnit`, `Id-Moneda`, `Id-Seq`).
  - En ambos modos: solo se actualiza `FecFin` en el encabezado (`FecIni` se conserva); `Usuario` se sobrescribe con `IdUser`.
  - Todo en una sola transacción con bloqueo del contrato (`EXCLUSIVE-LOCK NO-WAIT`).

  ---

  ## 12. Resultado

  | Estado | Descripción |
  |--------|-------------|
  | ⏳ Pendiente prueba | Servicio desarrollado. Pendiente de compilación/deploy y QA. |

  ---

  ## 13. Observaciones Técnicas

  1. Auditoría: operación `EDITA` en `programas/auditoria.p` (módulo `Contratos`), con el detalle de nueva `FecFin`, bajas y partidas resultantes. En el carácter la baja sobre un activo se registraba además en `bitacorabajacontr.txt`.
  2. El candado de permiso (`OLDS`/`ALEX` en carácter) **no viaja como password al REST**: el front valida el permiso de la aplicación y solo manda `AutorizaFechaActivo`.
  3. El cambio de moneda del carácter (por artículo / general / automático) recalcula `PrecUnit`; en REST ese cálculo lo hace el front y manda el `PrecUnit`/`IdMoneda` resultante (el servicio solo lo persiste, y lo bloquea si el contrato está activo).
  4. Servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
  **Desarrollado por:** SIS10 - JASS
