  ---

  ## 9. Campos del Response (ttContrato)

  **`IdContrato`** В· INTEGER вЂ” Folio del contrato
  **`IdCot`** В· CHARACTER вЂ” CotizaciГіn origen
  **`IdCliente`** / **`RazonSocial`** вЂ” Cliente
  **`FecIni`** / **`FecFin`** В· DATE вЂ” Vigencia
  **`DiasVig`** В· INTEGER вЂ” DГ­as de vigencia (`FecFin в€’ FecIni`)
  **`Usuario`** В· CHARACTER вЂ” Usuario que dio de alta / activГі
  **`Activo`** / **`Cancelado`** В· BOOLEAN вЂ” Banderas de la tabla
  **`FecCanc`** / **`FecReactiv`** В· DATE вЂ” Fechas de cancelaciГіn / reactivaciГіn
  **`Estatus`** В· CHARACTER вЂ” Estatus calculado: **PENDIENTE** (dado de alta, sin activar) В· **ACTIVO** В· **CANCELADO** В· **VENCIDO** (`FecFin < hoy`, derivado)
  **`Partidas`** В· INTEGER вЂ” Cantidad de artГ­culos del contrato

  ---

  ## 10. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `FechaIni` o `FechaFin` vacГ­as | `IdError: true` вЂ” `"El rango de fechas del contrato es obligatorio (FechaIni y FechaFin, formato aaaa-mm-dd)."` |
  | `FechaFin < FechaIni` | `IdError: true` вЂ” `"La fecha final no puede ser menor a la inicial."` |
  | Sin contratos en el rango | `IdError: false` вЂ” `"Sin contratos con los criterios indicados."` |
  | Consulta correcta | `IdError: false` вЂ” `"Consulta generada: N contrato(s)."` |

  ---

  ## 11. Resultado

  | Estado | DescripciГіn |
  |--------|-------------|
  | вЏі Pendiente prueba | Servicio desarrollado. Pendiente de compilaciГіn/deploy y QA. |

  ---

  ## 12. Observaciones TГ©cnicas

  1. El estatus se calcula por registro (`EstatusContrato`); no es un campo de la tabla.
  2. Registro/mapeo del recurso en `resourceModel.xml` a cargo del usuario (alta manual).
  3. Servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

