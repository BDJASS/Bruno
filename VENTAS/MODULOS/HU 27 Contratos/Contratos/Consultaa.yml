  # Servicio REST вЂ” Contratos: Consulta (Listado)

  ---

  ## 1. TГ­tulo del Servicio

  **Contratos вЂ” Consulta / Listado**
  Lista los contratos de precios fijos por **rango de fechas de vigencia inicial** (`Contrato.FecIni`). Es el listado del mГіdulo de gestiГіn.
  Programa servidor: `contrato.p` В· Procedimiento: `consultaContratos` | VersiГіn REST de `vtaa0020.p`.

  ---

  ## 2. MГ©todo HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Contratos/Consulta
  ```

  ---

  ## 4. ParГЎmetros de Entrada (Query String)

  > вњ… = Requerido В· вќЊ = Opcional

  **`FechaIni`** В· DATE (ISO `aaaa-mm-dd`) В· вњ… вЂ” Inicio del rango sobre `Contrato.FecIni`
  **`FechaFin`** В· DATE (ISO `aaaa-mm-dd`) В· вњ… вЂ” Fin del rango; debe ser в‰Ґ `FechaIni`

  > No hay otros filtros: la consulta es Гєnicamente por rango de fechas.

  ---

  ## 5. Body

  No aplica.

  ---

  ## 6. Headers

  | Header   | Valor              |
  |----------|--------------------|
  | `Accept` | `application/json` |

  ---

  ## 7. Ejemplo de Request

  ```
  GET .../Ventas/Contratos/Consulta?FechaIni=2026-07-01&FechaFin=2026-07-31
  ```

  ---

  ## 8. Ejemplo de Response

