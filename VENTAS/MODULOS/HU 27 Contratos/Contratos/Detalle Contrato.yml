docs: |
  # Servicio REST — Contratos: Detalle

  ---

  ## 1. Título del Servicio

  **Contratos — Detalle**
  Devuelve un contrato como **DATASET**: cabecera (fecha, cliente, usuario, activo, estatus y los 4 márgenes) + partidas (artículo, color, presentación, moneda, precio, costo y margen por renglón).
  Programa servidor: `contrato.p` · Procedimiento: `consultaDetContrato` | Versión REST de `vtaa0021.p`.

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Contratos/Detalle
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`IdContrato`** · STRING · ✅ — Folio del contrato a consultar

  ---

  ## 5. Body

  No aplica.

  ---

  ## 6. Headers

  | Header   | Valor              |
  |----------|--------------------|
  | `Accept` | `application/json` |

  ---

  ## 7. Ejemplo de Request

  ```
  GET .../Ventas/Contratos/Detalle?IdContrato=2438
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Contrato 2438: 1 partida(s).",
      "dsContrato": {
        "dsContrato": {
          "ttContEnc": [
            {
              "IdContrato": 2438, "IdCot": "4101355", "IdCliente": 26,
              "RazonSocial": "FIDEL ALEJANDRO AYALA NOVAK",
              "FecIni": "2026-07-10", "FecFin": "2026-09-08", "DiasVig": 60,
              "Usuario": "sis10", "Activo": false, "Cancelado": false,
              "FecCanc": null, "FecReactiv": null, "Estatus": "PENDIENTE",
              "Partidas": 1,
              "PonIni": 16.9, "PonAct": 16.9, "AriIni": 16.9, "AriAct": 16.9
            }
          ],
          "ttDetContrato": [
            {
              "IdContrato": 2438, "Seq": 10, "IdArticulo": "021118",
              "DescrArt": "BOLIGRAFO P/MED. 1.0MM BIC M-250 923995 DURA+",
              "IdColor": 2, "Kolor": "AZUL", "IdPres": 4, "Presentacion": "C/12",
              "IdMoneda": 0, "Moneda": "", "PrecUnit": 41.4, "IndicaPre": "F",
              "CostoCot": 35.41368, "CostoEsp": 0.0, "IdMonedaCE": 1,
              "CostoIni": 35.41368, "CostoAct": 35.41368,
              "MargenIni": 16.90397609, "MargenAct": 16.90397609,
