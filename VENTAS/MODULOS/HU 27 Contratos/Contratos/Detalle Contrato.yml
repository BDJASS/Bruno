  ```

  ---

  ## 9. Campos del Response (DATASET dsContrato)

  ### ttContEnc (cabecera, 1 registro)
  **`IdContrato`, `IdCot`, `IdCliente`, `RazonSocial`, `FecIni`, `FecFin`, `DiasVig`, `Usuario`, `Activo`, `Cancelado`, `FecCanc`, `FecReactiv`, `Estatus`, `Partidas`**
  **`PonIni` / `PonAct`** · DECIMAL — Margen **ponderado** a la fecha inicial y a hoy (redondeado a 2 decimales)
  **`AriIni` / `AriAct`** · DECIMAL — Margen **aritmético** (promedio por renglón) inicial y actual (2 decimales)

  ### ttDetContrato (partidas)
  **`Seq`, `IdArticulo`, `DescrArt`, `IdColor`, `Kolor`, `IdPres`, `Presentacion`, `IdMoneda`, `Moneda`, `PrecUnit`, `IndicaPre`**
  **`CostoCot`, `CostoEsp`, `IdMonedaCE`** — datos de persistencia (se devuelven tal cual)
  **`CostoIni` / `CostoAct`** · DECIMAL — Costo a la fecha inicial y a hoy (insumo del ponderado)
  **`MargenIni` / `MargenAct`** · DECIMAL — Margen por renglón inicial y actual (insumo del aritmético)
  **`EnOtroContrato`** · BOOLEAN — El artículo ya está en otro contrato activo del cliente
  **`Descontinuado`** · BOOLEAN — Artículo/color descontinuado

  > **Nota:** el proveedor (`IdProv`/`NomProv`) NO se incluye en el detalle: no se usa.

  ---

  ## 10. Validaciones del Servicio

  | Caso | Comportamiento |
  |------|----------------|
  | `IdContrato` vacío, no numérico o ≤ 0 | `IdError: true` — `"Numero de contrato invalido."` |
  | Contrato inexistente | `IdError: true` — `"No existe folio en archivo de Contratos, favor de verificar."` |
  | Consulta correcta | `IdError: false` — `"Contrato N: M partida(s)."` |

  ---

  ## 11. Márgenes (cómo se calculan)

  Equivalen a los del modo carácter (`MarIni`/`MarFin`/`MarAritIni`/`MarAritFin`, vía `vtaa0023.p` contra `HCosto`/`CostoEsp`):
  - **Ponderado**: `((Σ PrecUnit / Σ CostoIni) − 1) × 100` a la fecha inicial (`PonIni`) y con `CostoAct` a hoy (`PonAct`).
  - **Aritmético**: promedio de `MargenIni` / `MargenAct` por renglón.

  El front puede recalcular los 4 totales en vivo al quitar renglones usando los campos por partida (`PrecUnit`, `CostoIni`, `CostoAct`, `MargenIni`, `MargenAct`).

  ---

  ## 12. Resultado

  | Estado | Descripción |
  |--------|-------------|
  | ⏳ Pendiente prueba | Servicio desarrollado. Pendiente de compilación/deploy y QA. |

  ---

  ## 13. Observaciones Técnicas

  1. Márgenes calculados con `vtaa0023.p` (RUN con `NO-ERROR`: un artículo sin costo cuenta como margen 0). El PROPATH del agente PASOE debe alcanzar `vtaa0023.p`.
  2. Servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
