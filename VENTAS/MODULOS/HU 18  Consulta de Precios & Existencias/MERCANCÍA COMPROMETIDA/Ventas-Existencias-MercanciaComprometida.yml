  ## 15. Observaciones Técnicas

  1. **Salida tipo DATASET:** `dsArtComprometido` contiene dos temp-tables — `ttArtInfo` (encabezado, 1 fila) y `ttArtComprometido` (detalle). Requiere `.pidl` regenerado al cambiar de TABLE a DATASET.
  2. **Presentación:** `PresDescr` corresponde a la presentación activa Tipo 1 del artículo (es la misma para los tres tipos).
  3. **Requisiciones abiertas:** se consideran solo las de `EstPedido.Estatus < 5` cuyo `ReqAlm.Id-Dest` coincide con `IdAlm`.
  4. **Órdenes de Producción:** se excluyen las que ya tienen `RepProd` (reporte de producción) asociado.
  5. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

