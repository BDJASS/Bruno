  ---

  ## 13. Observaciones Técnicas

  1. **Campo `Id-Moneda` con guion:** El temp-table conserva el campo original `Id-Moneda` (con guion) y añade `IdMoneda` (sin guion) con el mismo valor. Para consumo desde el front se recomienda usar `IdMoneda`, ya que el guion puede complicar el mapeo en algunos clientes JSON.
  2. **Modo normal vs. `TC`:** En modo normal (`ctTipoPrecio` vacío) se recorre `TipoCambio` con los filtros de moneda y fecha; el campo `Tipo` viene vacío. En modo `TC` se ignoran los filtros de fecha y se devuelven exactamente hasta dos renglones por moneda: `Sistema` (FIND FIRST `TipoCambio`) y `Real` (FIND LAST `TCReal`).
  3. **`TC` requiere moneda:** El bloque `TC` solo se ejecuta cuando `IdMoneda > 0`. Si se envía `TC` sin moneda (o con `0`), la respuesta es exitosa pero vacía.
  4. **`ctTipoPrecio` no distingue mayúsculas:** Se valida con `CAPS()`, por lo que `"tc"`, `"Tc"` y `"TC"` son equivalentes.
  5. **Filtro de fecha opcional:** En modo normal, si `ctFecha` viene vacío se devuelven todas las fechas de la(s) moneda(s) seleccionada(s), ordenadas por el índice primario (`Id-Moneda` ASC, `FecReg` DESC).
  6. **Nombre y símbolo:** Provienen de la tabla `Moneda`; si la moneda no existe en `Moneda`, esos campos quedan vacíos pero el renglón del tipo de cambio se devuelve igual (solo en modo normal).
  7. **Convención REST:** El servicio sigue el patrón `IdError` (LOGICAL) + `Respuesta` (CHARACTER) + temp-table, alineado con el resto de servicios de `RestADOSAVentas`.
  8. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.

  ---
