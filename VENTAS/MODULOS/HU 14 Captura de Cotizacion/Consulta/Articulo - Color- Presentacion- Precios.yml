docs: |
  # Servicio REST — Captura de Cotización: Partidas (Artículo / Colores / Presentaciones)

  ---

  ## 1. Título del Servicio

  **Captura de Cotización — Partidas (Progresivo)**
  Servicio **progresivo** para armar una partida de la cotización. Según los parámetros que reciba, retorna en un solo dataset: los datos del artículo, sus colores con existencia en CEDIS y las presentaciones con precio.
  Programa servidor: `cotpartida.p` · Procedimiento: `leeArticuloCotiza` | Consulta independiente (`Articulo`, `ArtCol`, `Kolor`, `ArtUbic`, `ArtPres`, `Precios`); el precio del cliente reusa `obtprecdesc.p`.

  **Flujo (cómo se va armando):**
  1. Se envía **`IdArticulo`** → regresa `ttArticulo` (con `TieneColores`).
     - Si `TieneColores = true` → regresa `ttColor` (combo de colores con existencia CEDIS). **Aún no hay presentaciones.**
     - Si `TieneColores = false` → regresa directo `ttPresentacion` (con precios).
  2. El usuario elige un color y se reenvía **`IdArticulo` + `IdColor`** → regresa `ttPresentacion` (con precios).
  3. El usuario elige presentación y captura **cantidad**; el **importe = cantidad × precio** lo calcula el front.

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Cotizacion/Captura/Partidas
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`IdArticulo`** · STRING · ✅ — Clave del artículo
  **`IdColor`** · STRING · ❌ — Color elegido. Resuelve las presentaciones cuando el artículo tiene colores · `0`/vacío = sin color
  **`IdPres`** · STRING · ❌ — Presentación (informativo; no filtra la lista)
  **`IdCliente`** · STRING · ❌ — Cliente. **Necesario para el precio del cliente** (`PrecioCliente`). Sin él, solo se devuelve el precio mayoreo simple
  **`PlazoTV`** · STRING · ❌ — Plazo para tipo de venta (de las Condiciones) · Default `0`
  **`IdUbiVta`** · STRING · ❌ — Ubicación de venta del vendedor
  **`Vigencia`** · STRING · ❌ — Días de vigencia (de las Condiciones) · Default `10`
  **`PrecioTemp`** · STRING · ❌ — Precios de temporada (`SI`/`NO`) · Default `NO`
  **`PrecCalc`** · STRING · ❌ — Recalcular precios (`SI`/`NO`) · Default `NO`
  **`TipoPrecio`** · STRING · ❌ — Tipo de precio (`M`/`MX`/`TC`/`EX`) · Default `M`

  > Los parámetros de precio (`PlazoTV`, `Vigencia`, `PrecioTemp`, `PrecCalc`, `TipoPrecio`) provienen del widget **Condiciones** de la cotización. Si no se envían, el servicio aplica los defaults indicados para poder calcular el precio del cliente.

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  # Paso 1: solo artículo (artículo con colores -> regresa colores)
  GET .../Cotizacion/Captura/Partidas?IdArticulo=023602&IdCliente=35

  # Paso 2: con color elegido -> regresa presentaciones con precio
  GET .../Cotizacion/Captura/Partidas?IdArticulo=023602&IdColor=1594&IdPres=7&IdCliente=35
  ```

  ---

  ## 8. Ejemplo de Response

  ### Paso 1 — Artículo con colores (`TieneColores = true`)

  ```json
  {
    "IdError": false,
    "Respuesta": "Articulo con colores; seleccione un color.",
    "dsCotPartida": {
      "ttArticulo": [
        {
          "IdArticulo": "023602",
          "Descr": "CARTULINA OPALINA",
          "Generico": "CARTULINA",
          "PorcIVA": 16,
          "TieneColores": true,
          "ttColor": [
            { "IdArticulo": "023602", "IdColor": 1594, "Descr": "AGUA MARINA", "ExistenciaCEDIS": 10200.0 },
            { "IdArticulo": "023602", "IdColor": 1601, "Descr": "AMARILLO",    "ExistenciaCEDIS": 8350.0 }
          ],
          "ttPresentacion": []
        }
      ]
    }
  }
  ```

  ### Paso 2 — Con color elegido (regresa presentaciones)

  ```json
  {
    "IdError": false,
    "Respuesta": "Articulo y presentaciones cargados.",
    "dsCotPartida": {
      "ttArticulo": [
        {
          "IdArticulo": "023602",
          "Descr": "CARTULINA OPALINA",
          "Generico": "CARTULINA",
          "PorcIVA": 16,
          "TieneColores": true,
          "ttColor": [
            { "IdArticulo": "023602", "IdColor": 1594, "Descr": "AGUA MARINA", "ExistenciaCEDIS": 10200.0 }
          ],
          "ttPresentacion": [
            {
              "IdArticulo": "023602",
              "IdPres": 6,
              "Descr": "CO/1000",
              "Abrev": "CO",
              "Equiv": 1000.0,
              "PrecioMay": 948.28,
              "PrecioMayUM": 0.94828,
              "PrecioCliente": 901.87,
              "PrecioClienteSinDesc": 948.28,
              "Descto": 4.89,
              "IdMoneda": 1,
              "SimboloMoneda": "$",
              "TCambio": 1.0
            }
          ]
        }
      ]
    }
  }
  ```

  ### Campos de `ttArticulo` (1 registro)

  **`IdArticulo`** · STRING — Clave del artículo
  **`Descr`** · STRING — Descripción del artículo
  **`Generico`** · STRING — Descripción genérica
  **`PorcIVA`** · INT — Porcentaje de IVA del artículo
  **`TieneColores`** · BOOLEAN — `true` = el artículo maneja colores (existe `ArtCol` activo). El front abre el **combo de colores**; `false` = pasa directo a presentaciones

  ### Campos de `ttColor` (0..N — colores con existencia en CEDIS)

  > Tabla anidada en `ttArticulo`. Se llena solo si `TieneColores = true`. Ordenada por descripción.

  **`IdArticulo`** · STRING — Clave del artículo
  **`IdColor`** · INT — Clave del color (se reenvía como `IdColor` al elegir)
  **`Descr`** · STRING — Nombre del color (tabla `Kolor`). Ej: `"AGUA MARINA"`
  **`ExistenciaCEDIS`** · DECIMAL — Existencia disponible en **CEDIS** (almacén `02B`). Ej: `10200.0`

  ### Campos de `ttPresentacion` (0..N — presentaciones con precio)

  > Tabla anidada en `ttArticulo`. Se llena cuando el artículo **no tiene colores** o cuando ya se envió `IdColor`.

  **`IdArticulo`** · STRING — Clave del artículo
  **`IdPres`** · INT — Clave de la presentación. Ej: `6`
  **`Descr`** · STRING — Descripción de la presentación. Ej: `"CO/1000"`
  **`Abrev`** · STRING — Abreviatura de la presentación
  **`Equiv`** · DECIMAL — Equivalencia en unidades de la presentación
  **`PrecioMay`** · DECIMAL — **Precio por presentación** (mayoreo, `Precios.PMay`). Ej: `948.28`
  **`PrecioMayUM`** · DECIMAL — **Precio por unidad** (`PMay / Equiv`). Ej: `0.94828`
  **`PrecioCliente`** · DECIMAL — Precio del cliente **con descuento** (`obtprecdesc.Precio2`). `0` si no se envió `IdCliente` o no aplica
  **`PrecioClienteSinDesc`** · DECIMAL — Precio del cliente **sin descuento** (`obtprecdesc.Precio1`)
  **`Descto`** · DECIMAL — % de descuento aplicado al cliente
  **`IdMoneda`** · INT — Moneda del precio (`1` = MN)
  **`SimboloMoneda`** · STRING — Símbolo de la moneda
  **`TCambio`** · DECIMAL — Tipo de cambio aplicado

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "No se encontro el articulo 999999.",
    "dsCotPartida": { "ttArticulo": [], "ttColor": [], "ttPresentacion": [] }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Condición | Comportamiento |
  |-----------|----------------|
  | `IdArticulo` vacío | `IdError: true` — `"Se requiere el articulo."` |
  | Artículo no encontrado / inactivo | `IdError: true` — `"No se encontro el articulo <id>."` |
  | Artículo con colores y sin `IdColor` | OK; regresa `ttColor`, `ttPresentacion` vacía. `Respuesta`: *"seleccione un color"* |
  | Artículo sin colores | OK; regresa `ttPresentacion` directo |
  | `IdColor` enviado | OK; regresa `ttPresentacion` con precios |
  | Sin `IdCliente` | OK; presentaciones solo con precio mayoreo simple (cliente en `0`) |
  | `obtprecdesc.p` no desplegado | OK (degrada); presentaciones solo con precio mayoreo simple |
  | Presentación sin precio de cliente | OK; esa presentación conserva el precio mayoreo simple |

  ---

  ## 10. Reglas de Negocio para el Front

  1. **Combo de colores:** si `ttArticulo.TieneColores = true`, el front abre un **combo de colores** mostrando `Descr` y `ExistenciaCEDIS` (ej. `"AGUA MARINA" — 10200`). Al elegir un color, el front **reenvía el servicio con `IdColor`** para obtener las presentaciones.
  2. **Sin colores:** si `TieneColores = false`, el front salta el combo y muestra directo las presentaciones.
  3. **Presentación y precios:** cada presentación muestra `PrecioMay` (**por presentación**) y `PrecioMayUM` (**por unidad**). Si hay `IdCliente`, también `PrecioCliente` (precio final del cliente con descuento).
  4. **Importe (front):** al capturar la **cantidad**, el front calcula el **importe = cantidad × precio** (precio según la presentación/precio elegido). Este cálculo es responsabilidad del front.

  ---

  ## 11. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*

  ---

  ## 12. Fecha de Prueba

  | Ambiente | Fecha         | Ejecutado por |
  |----------|---------------|---------------|
  | DEV      | *(pendiente)* | *(pendiente)* |

  ---

  ## 13. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 14. Observaciones Técnicas

  1. **Servicio progresivo:** una sola operación (`leeArticuloCotiza`) que devuelve más o menos tablas según los parámetros recibidos (artículo / +color). El front (.NET) acumula el estado.
  2. **Dataset de 3 tablas:** `ttColor` y `ttPresentacion` van **anidadas** dentro de `ttArticulo` (relaciones `NESTED` por `IdArticulo`).
  3. **CEDIS = almacén `02B`:** la existencia de cada color sale de `ArtUbic` con `Id-Alm = "02B"` (mismo criterio que `artcolor.p`).
  4. **Presentaciones:** `ArtPres` con `Tipo = 3`, `Activo` y sin `Flag` que contenga `T` (mismo criterio que `artpres_p.p`). Precio mayoreo simple de `Precios.PMay`; `PrecioMayUM = PMay / Equiv`.
  5. **Precio del cliente (reuso de `obtprecdesc.p`):** se invoca `leePrecios` **una vez por presentación** (ese motor calcula una presentación por llamada, exige `Id-Pres <> 0`). El resultado (`Precio1`, `Precio2`, `Descto`, moneda, T.C.) se mezcla en `ttPresentacion`.
  6. **Defaults de criterios de precio:** si llegan vacíos, el servicio aplica `PlazoTV=0`, `Vigencia=10`, `PrecioTemp=NO`, `PrecCalc=NO`, `TipoPrecio=M`, `IdColor=0` (mismos defaults del widget Condiciones), porque `obtprecdesc.p` exige valores válidos (`SI/NO`, `M/MX/TC/EX`, enteros).
  7. **Degradación elegante:** si `obtprecdesc.p` no está en el PROPATH del PASOE (`SEARCH`), o si una presentación falla en el cálculo, el servicio **no truena**: devuelve artículo, colores y presentaciones con el **precio mayoreo simple**, dejando las columnas de precio del cliente en `0`. Cada presentación se aísla con su propio bloque de error.
  8. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
  **Desarrollado por:** SIS10 - JASS
