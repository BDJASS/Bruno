docs: |-
  # Servicio REST — Captura de Cotización: Partidas

    

  ---

    

  ## 1. Título del Servicio

    

  **Captura de Cotización — Partidas (armado progresivo)**

  Servicio progresivo para capturar una partida de cotización. Según los parámetros que reciba, retorna en un solo dataset: los datos del artículo (con múltiplo por default), los colores con existencia y las presentaciones con ambos precios (mayoreo simple y precio del cliente), indicador de precio, precio de contrato y existencia en el almacén de surtido.

  Programa servidor: `cotpartida.p` · Procedimiento: `leeArticuloCotiza` | Precio del cliente vía `obtprecdesc.p` (motor de precios, degradable).

    

  ---

    

  ## 2. Método HTTP

    

  ```

  GET

  ```

    

  ---

    

  ## 3. URL Completa

    

  ```

  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Cotizacion/Captura/Partidas

  ```

    

  ---

    

  ## 4. Parámetros de Entrada (Query String)

    

  > ✅ = Requerido · ❌ = Opcional · Todos viajan como STRING

    

  **`IdArticulo`** · STRING · ✅ — Clave del artículo (debe existir y estar activo)

    

  **`IdColor`** · STRING · ❌ — Color elegido. Si el artículo maneja colores, es necesario para resolver presentaciones y precios

  - Vacío o `0` = sin color (o aún no elegido)

    

  **`IdPres`** · STRING · ❌ — Presentación (reservado; hoy no filtra)

    

  **`IdCliente`** · STRING · ❌ — Cliente; necesario para calcular el precio del cliente (`obtprecdesc.p`)

    

  **`PlazoTV`** · STRING · ❌ — Plazo/tipo de venta (criterio de precio) · Default `0`

    

  **`IdUbiVta`** · STRING · ❌ — Ubicación de venta (criterio de precio)

    

  **`Vigencia`** · STRING · ❌ — Días de vigencia (criterio de precio) · Default `10`

    

  **`PrecioTemp`** · STRING · ❌ — Precios de temporada `SI`/`NO` · Default `NO`

    

  **`PrecCalc`** · STRING · ❌ — Precio calculado `SI`/`NO` · Default `NO`

    

  **`TipoPrecio`** · STRING · ❌ — Tipo de precio · Default `M`

    

  **`IdAlm`** · STRING · ❌ — Almacén de surtido elegido en la cotización ("Surtir desde", ej. `02B` = CEDIS). Alimenta `ttColor.Existencia` y `ttPresentacion.Existencia`

  - Vacío = `02B` (CEDIS, comportamiento por default)

    

  ---

    

  ## 5. Body

    

  No aplica. Método `GET`.

    

  ---

    

  ## 6. Headers

    

  | Header         | Valor                                  |

  |----------------|----------------------------------------|

  | `Accept`       | `application/json`                     |

  | `Content-Type` | `application/json` *(opcional en GET)* |

    

  ---

    

  ## 7. Ejemplo de Request

    

  ```

  GET .../Cotizacion/Captura/Partidas?IdArticulo=021118&IdColor=0&IdCliente=26&PlazoTV=0&Vigencia=10&PrecioTemp=NO&PrecCalc=NO&TipoPrecio=M&IdAlm=02B

  ```

    

  ---

    

  ## 8. Ejemplo de Response

    

  ```json

  {

    "IdError": false,

    "Respuesta": "Articulo y presentaciones cargados.",

    "dsCotPartida": {

      "ttArticulo": [

        {

          "IdArticulo": "021118",

          "Descr": "SOBRE BOLSA KRAFT T/CARTA",

          "Generico": "SOBRE BOLSA",

          "PorcIVA": 16,

          "TieneColores": false,

          "IdGrupo": 21,

          "IdMarca": 118,

          "IdFamilia": 2,

          "IdProv": 350,

          "Multiplo": 12.0,

          "ttColor": [],

          "ttPresentacion": [

            {

              "IdArticulo": "021118",

              "IdPres": 4,

              "Descr": "C/12",

              "Abrev": "",

              "Equiv": 12.0,

              "PrecioMay": 48.71,

              "PrecioMayUM": 4.0591666667,

              "PrecioCliente": 41.4,

              "PrecioClienteSinDesc": 48.71,

              "Descto": 0.0,

              "IndicaPre": "F",

              "PrecioCto": 0.0,

              "Existencia": 385948.0,

              "IdMoneda": 0,

              "SimboloMoneda": "",

              "TCambio": 0.0,

              "Costo": 0.0,

              "CostoOrig": 0.0

            }

          ]

        }

      ]

    }

  }

  ```

    

  ### Campos de `ttArticulo` (1 registro — datos del artículo)

    

  **`IdArticulo`** · STRING — Clave del artículo

  **`Descr`** · STRING — Descripción del artículo

  **`Generico`** · STRING — Descripción genérica

  **`PorcIVA`** · INT — Porcentaje de IVA del artículo

  **`TieneColores`** · BOOLEAN — `true` = el artículo maneja colores; se debe elegir uno para resolver presentaciones

  **`IdGrupo`** · INT — Grupo del artículo

  **`IdMarca`** · INT — Marca del artículo

  **`IdFamilia`** · INT — Familia (del grupo)

  **`IdProv`** · INT — Proveedor del artículo

  **`Multiplo`** · DECIMAL — Múltiplo por default para cotizar, en unidad mínima (`Equiv` de la presentación Tipo 3 con `Flag` `M`, igual que `valpres.p` del call center). `0` = sin restricción de multiplicidad

    

  ### Campos de `ttColor` (1 registro por color activo — solo si `TieneColores`)

    

  **`IdArticulo`** · STRING — Clave del artículo

  **`IdColor`** · INT — Clave del color

  **`Descr`** · STRING — Descripción del color

  **`ExistenciaCEDIS`** · DECIMAL — Existencia del color en CEDIS (`02B`), unidad mínima. Se conserva por compatibilidad (respaldo del front)

  **`Existencia`** · DECIMAL — Existencia del color en el almacén de surtido `IdAlm`, unidad mínima

    

  ### Campos de `ttPresentacion` (1 registro por presentación Tipo 3 activa)

    

  **`IdArticulo`** · STRING — Clave del artículo

  **`IdPres`** · INT — Clave de la presentación

  **`Descr`** · STRING — Descripción de la presentación

  **`Abrev`** · STRING — Abreviatura

  **`Equiv`** · DECIMAL — Equivalencia en unidad mínima

  **`PrecioMay`** · DECIMAL — Precio mayoreo simple (`Precios.PMay`)

  **`PrecioMayUM`** · DECIMAL — Precio mayoreo por unidad mínima (`PMay / Equiv`)

  **`PrecioCliente`** · DECIMAL — Precio real del cliente (con descuento aplicado)

  **`PrecioClienteSinDesc`** · DECIMAL — Precio del cliente sin descuento

  **`Descto`** · DECIMAL — Porcentaje de descuento del cálculo de precios

  **`IndicaPre`** · STRING — Indicador de precio del motor: `""` = lista; `F` = precio fijo/especial del cliente; `D` = descuento del cálculo de precios; `Z` = descuento recalculado; `X` = precio en moneda extranjera. La letra `C` (contrato) y las marcas `*`/`Y` las asigna el front

  **`PrecioCto`** · DECIMAL — Precio de contrato del cliente para esa presentación; `0` = sin contrato vigente

  **`Existencia`** · DECIMAL — Existencia del artículo (o artículo+color consultado) en el almacén `IdAlm`, unidad mínima — cubre artículos sin color

  **`IdMoneda`** · INT — Moneda del precio del cliente

  **`SimboloMoneda`** · STRING — Símbolo de la moneda

  **`TCambio`** · DECIMAL — Tipo de cambio

  **`Costo`** · DECIMAL — Costo (reservado)

  **`CostoOrig`** · DECIMAL — Costo original (reservado)

    

  ### Response de error controlado

    

  ```json

  {

    "IdError": true,

    "Respuesta": "No se encontro el articulo 999999.",

    "dsCotPartida": { "ttArticulo": [] }

  }

  ```

    

  ---

    

  ## 9. Validaciones del Servicio

    

  | Caso | Comportamiento |

  |------|----------------|

  | `IdArticulo` vacío | `IdError: true` — `"Se requiere el articulo."` |

  | Artículo inexistente o inactivo | `IdError: true` — `"No se encontro el articulo X."` |

  | Artículo con colores y sin `IdColor` | Consulta OK; `Respuesta: "Articulo con colores; seleccione un color."` — retorna `ttArticulo` + `ttColor`, sin presentaciones |

  | Artículo sin colores (o con `IdColor` elegido) | Consulta OK; retorna `ttArticulo` + `ttPresentacion` con precios |

  | `IdCliente` vacío o `0` | Presentaciones solo con precio mayoreo simple (sin precio del cliente, `IndicaPre` y `PrecioCto` vacíos/0) |

  | `IdAlm` vacío | Existencias calculadas contra CEDIS (`02B`) |

  | Motor de precios no desplegado | Degradación silenciosa: solo precio mayoreo simple |

    

  ---

    

  ## 10. Evidencia de Ejecución

    

  *Pendiente de captura por parte del equipo de QA.*

    

  ---

    

  ## 11. Fecha de Prueba

    

  | Ambiente | Fecha      | Ejecutado por |

  |----------|------------|---------------|

  | DEV      | *(pendiente)* | *(pendiente)* |

    

  ---

    

  ## 12. Resultado

    

  | Estado              | Descripción                                                       |

  |---------------------|-------------------------------------------------------------------|

  | ⏳ Pendiente prueba | Servicio actualizado en DEV. Pendiente de ejecución formal por QA. |

    

  ---

    

  ## 13. Observaciones Técnicas

    

  1. **Flujo progresivo:** con solo `IdArticulo` retorna el artículo y, si maneja colores, la lista de colores (sin presentaciones). Al reconsultar con `IdColor` (o si el artículo no maneja colores) retorna las presentaciones con precios.

  2. **Precio del cliente (degradable):** el precio real del cliente se calcula reusando `obtprecdesc.p` (`leePrecios`), el mismo motor de precios del call center (`artprecios2`). Se llama una vez por presentación; si el motor no está desplegado o una presentación falla, esa presentación conserva solo su precio mayoreo simple, sin marcar error.

  3. **Campo `IndicaPre` (paridad con el legado):** se expone tal cual lo regresa el motor de precios: `""` (lista), `F` (precio fijo/especial del cliente), `D` (descuento del cálculo de precios), `Z` (descuento recalculado), `X` (precio en moneda extranjera). La letra `C` (contrato) **no** la regresa el backend: la asigna el front cuando el usuario acepta aplicar el `PrecioCto` (modal "¿Desea respetar el precio del contrato?"). Las marcas `*`/`Y` (precio modificado manualmente o por factor) también son del front.

  4. **Campo `PrecioCto`:** precio de contrato del cliente para la combinación cliente + artículo + presentación, tomado del motor de precios; `0` = sin contrato vigente.

  5. **Existencias por almacén (`IdAlm`):** `ttColor.Existencia` y `ttPresentacion.Existencia` se calculan contra el almacén de surtido recibido en `IdAlm` (default `02B` = CEDIS), leyendo `ArtUbic.Exist` en unidad mínima — la misma base que usa el legado `valpres.p` para el semáforo rojo/amarillo de cantidad (`Cant × Equiv > Existencia`). No se resta comprometido. `ttColor.ExistenciaCEDIS` se conserva (fija a `02B`) porque el front la usa como respaldo.

  6. **Campo `Multiplo`:** replica la regla de `valpres.p` del call center: es el `Equiv` de la presentación Tipo 3 cuyo `Flag` contiene `M` (presentación por default), ignorando registros con `Flag` vacío. `0` = sin restricción. La validación de multiplicidad y la cantidad sugerida las calcula el front, sin llamada extra.

  7. **Presentaciones incluidas:** `ArtPres` con `Tipo = 3`, activas y sin `Flag` `T` (igual que `artpres_p.p`).

  8. **Origen del cambio:** solicitud del front 2026-07-02 (`2026-07-02_solicitud_backend-captura-cotizacion-partidas.md`) para paridad con el call center legado (`capturaCotizaciones.php` / `artprecios2` / `valpres.p`) sin consultar un servicio adicional (`valpresentacion`) en cada captura. Los avisos avanzados de resurtido del legado (MsgWarning) quedan fuera de alcance en esta fase.

  9. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

    

  ---

  **Desarrollado por:** SIS10 - JASS
