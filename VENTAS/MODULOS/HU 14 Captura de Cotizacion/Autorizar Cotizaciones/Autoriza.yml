docs: |
  # Servicio REST — Grabado / Alta de Cotización

  ---

  ## 1. Título del Servicio

  **Alta de Cotización (Alta)**
  Crea una cotización a partir del dataset recibido (encabezado + partidas). Genera el folio, valida encabezado y detalle, calcula costos, totales y la autorización, y devuelve la cotización grabada (con su folio asignado).
  Programa servidor: `cotizacion2.p` · Procedimiento: `creaCotizaciones` | Motor de grabado existente y probado (folio, validaciones, costos, autorización, transacción única).

  > ⚠️ El front de captura (.NET) **calcula importes/IVA/precios** y envía el dataset completo; el servidor valida, asigna folio y graba en una sola transacción.

  ---

  ## 2. Método HTTP

  ```
  POST
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Cotizacion/Captura/Alta
  ```

  > El recurso interno es `cot2` / operación `creaCotizaciones`. La ruta amigable (`/Cotizacion/Captura/Alta`) se define en el catálogo de servicios del PASOE.

  ---

  ## 4. Parámetros de Entrada

  No usa Query String. Toda la información viaja en el **Body** (dataset `dsCot2`).

  ---

  ## 5. Body (JSON completo para crear una cotización)

  El body es el dataset `dsCot2` = **`ttCot`** (1 registro, encabezado) + **`ttDetCot`** (N registros, partidas).

  ```json
  {
    "dsCot2": {
      "ttCot": [
        {
          "Id-Cot": "",
          "IdCot": "",
          "Iniciales": "GLT",
          "Id-Vendedor": "0077",
          "IdVendedor": "0077",
          "Firma": "0077",
          "Id-Cliente": 35520,
          "IdCliente": 35520,
          "id-UbiVta": "COM",
          "IdUbiVta": "COM",
          "IdAlm": "02B",
          "Attn": "LUIS MARRUFO",
          "RazonSocial": "CONSEJO CIVICO DE INSTITUCIONES DE NUEVO LEON",
          "Propietario": "SANDRINE DENISE MOLINARD",
          "RFC": "CIN750705CW0",
          "Tel": "8189892600",
          "Fax": "",
          "CalleNo": "AV DEL ESTADO 208",
          "Colonia": "TECNOLOGICO",
          "Id-Ciudad": 118,
          "IdCiudad": 118,
          "Estado": "NUEVO LEON",
