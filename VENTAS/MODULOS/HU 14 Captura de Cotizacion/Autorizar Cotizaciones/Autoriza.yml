          "FecCap": null,
          "Hora": "",
          "PartDetCot": 0
        }
      ],
      "ttDetCot": [
        {
          "Id-Cot": "",
          "IdCot": "",
          "Id-Seq": 10,
          "IdSeq": 10,
          "Tipo": 1,
          "Id-Articulo": "021118",
