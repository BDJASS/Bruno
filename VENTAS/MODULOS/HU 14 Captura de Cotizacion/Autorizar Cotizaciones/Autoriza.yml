  > **JSON real tomado del portal.** Nótese que el front envía **ambas variantes** de los campos clave (con guion `Id-Cot`/`Id-Vendedor`/`Id-color`… y sin guion `IdCot`/`IdVendedor`/`IdColor`…) y la mayoría de los campos del temp-table. Para un **alta nueva** deja `Id-Cot`/`IdCot` **vacíos**: el servidor asigna el folio (en el ejemplo aparece vacío por eso; si se manda un folio, el servidor igual genera uno nuevo).

  ### Campos de `ttCot` (encabezado — 1 registro)

  > ✅ = Requerido · ❌ = Opcional · 🔄 = Lo calcula/asigna el servidor (no enviar)

  **`Iniciales`** · STRING · ✅ — Usuario que captura. Si va vacío → error *"No se mando usuario de la transaccion."*
  **`IdVendedor`** · STRING · ✅ — Clave del vendedor; debe existir y tener `Empleado`
  **`IdCliente`** · INT · ✅ — Clave del cliente
  **`IdUbiVta`** · STRING · ❌ — Ubicación de venta del vendedor
  **`IdAlm`** · STRING · ❌ — Almacén origen. Si va vacío se usa la ubicación del usuario o `02B`
  **`Attn`** · STRING · ❌ — Contacto/"Attn" (puede ir vacío; texto libre)
  **`RazonSocial` `Propietario` `RFC` `Tel`** · STRING · ❌ — Datos del cliente (encabezado de impresión)
  **`CalleNo` `Colonia` `IdCiudad` `Estado` `CP` `Pais`** · ❌ — Domicilio del cliente
  **`TipoPrecio`** · STRING · ✅ — `M` / `MX` / `TC` / `II` (afecta presentación y autorización)
  **`LAB`** · STRING · ❌ — Lugar de entrega (`M` / `E`)
  **`DiasEnt`** · INT · ❌ — Días de entrega
  **`Plazo`** · INT · ❌ — Plazo de crédito (días); `0` = contado
  **`Vigencia`** · INT · ✅ — Días de vigencia. **Máximo `180`** (si excede → error *"Vigencia No Autorizada."*)
  **`PrecioTemp`** · BOOLEAN · ❌ — `true` = aplica precios de temporada
  **`DescPP` `DescPP2`** · DECIMAL · ❌ — Descuentos por pronto pago (%). El **combinado no puede exceder `18%`**
  **`PlazoPP`** · INT · ❌ — Plazo de pronto pago
  **`TipoFactor`** · STRING · ❌ — `FI` (incremento) · `FD` (descuento, `Factor` ≤ 18) · `FC` (sobre costo, `Factor` ≥ 10) · vacío
  **`Factor`** · DECIMAL · ❌ — Valor del factor según `TipoFactor`
  **`Firma`** · STRING · ❌ — Vendedor que firma. Si va vacío el servidor usa `IdVendedor`; si se envía, debe ser vendedor válido
  **`Notas`** · STRING[2] · ❌ — Notas de la cotización (arreglo de 2)
  **`Id-SolCot`** · INT · ❌ — Folio de solicitud de cotización (si aplica)
  **`EspCPM`** · BOOLEAN · ❌ — Bandera de especial
  **`IdCot`** · 🔄 — **Folio**, lo genera el servidor (tabla `Folio`, `Id-Doc = "COTIZA"`)
  **`FecReg` `Hora`** · 🔄 — Fecha/hora de registro = servidor (`TODAY`/`TIME`)
  **`SubTotal` `IVA` `Tot`** · 🔄 — Totales; los **recalcula** el servidor sumando las partidas
  **`Autorizada` `Estatus`** · 🔄 — Las determina el servidor (ver sección 10)

  ### Campos de `ttDetCot` (partidas — N registros)

  > Una partida de artículo usa `Tipo = 1` (dispara validación de existencia, costo, etc.).

  **`IdSeq`** · INT · ✅ — Secuencia/orden de la partida (orden de impresión)
  **`Tipo`** · INT · ✅ — `1` = artículo (otros tipos = líneas especiales/comentario)
  **`IdArticulo`** · STRING · ✅ — Clave del artículo; debe existir y estar activo
  **`IdColor`** · INT · ✅ — Color (`0` si el artículo no maneja color)
  **`IdPres`** · INT · ✅ — Presentación
  **`Descr`** · STRING · ✅ — Descripción de la partida (como se imprime)
  **`Cant`** · DECIMAL · ✅ — Cantidad. Sin decimales si la presentación no lo permite (`SiDec = false`)
  **`PUnit`** · DECIMAL · ✅ — Precio unitario (lo calcula el front)
  **`Descto`** · INT · ❌ — % de descuento de la partida
  **`PorcIVA`** · DECIMAL · ❌ — % de IVA del artículo
  **`Iva`** · DECIMAL · ✅ — Importe de IVA de la partida (lo suma el servidor al total)
  **`Importe`** · DECIMAL · ✅ — Importe de la partida (`Cant × PUnit` con descuento; lo suma el servidor)
  **`IndicaPre`** · STRING · ✅ — Indicador de precio: `L` (lista) · `D` (manual/descuento) · `C` (contrato) · `*` (especial) · `F` · etc. Afecta la autorización
  **`IdMoneda`** · INT · ✅ — Moneda de la partida (`1` = MN)
  **`IdMonedaCE`** · INT · ❌ — Moneda del costo especial (default `1`)
  **`Costo` `PCosto` `CostoEsp`** · DECIMAL · 🔄 — Si van en `0`, el servidor los calcula (`CostoDetCot`: `HCosto`, equivalencia, oferta, moneda)
  **`sColor` `Pres`** · STRING · 🔄 — Descriptivos; el servidor asigna `sColor` desde `Kolor`

  ---

  ## 6. Headers

  | Header         | Valor                |
  |----------------|----------------------|
  | `Accept`       | `application/json`   |
  | `Content-Type` | `application/json`   |

  ---

  ## 7. Ejemplo de Response (éxito)

  El servicio devuelve `IdError`, `Respuesta` y el dataset `dsCot2` con el **folio asignado** en `ttCot.IdCot`.

  ```json
  {
    "IdError": false,
    "Respuesta": "",
    "dsCot2": {
      "ttCot": [
        {
          "IdCot": "B000123456",
          "IdCliente": 33997,
          "IdVendedor": "4785",
          "FecReg": "2026-06-26",
          "SubTotal": 9018.70,
          "IVA": 1442.99,
          "Tot": 10461.69,
          "Autorizada": true,
          "Vigencia": 10
        }
      ],
      "ttDetCot": [
        {
          "IdCot": "B000123456",
          "IdSeq": 1,
          "IdArticulo": "023602",
          "IdColor": 1594,
          "IdPres": 6,
          "Cant": 10,
          "PUnit": 901.87,
          "Importe": 9018.70,
          "Costo": 720.50
        }
      ]
    }
  }
  ```

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "El articulo no se encuentra en el catalogo o esta inactivo: 023602. ",
    "dsCot2": { "ttCot": [], "ttDetCot": [] }
  }
  ```

  ---

  ## 8. Generación del Folio

  - El folio sale de la tabla `Folio` con `Id-Doc = "COTIZA"` y `Id-Alm = <origen>`.
  - Origen = `ttCot.IdAlm`; si va vacío, la ubicación del usuario (`Usuario.id-Ubicacion`) o `02B`.
  - Formato: `Folio.Prefijo + STRING(Folio.Folio,"999999")`. El contador se incrementa de forma exclusiva (reintentos hasta 50).

  ---

  ## 9. Validaciones del Servicio

  | Condición | Comportamiento |
  |-----------|----------------|
  | Sin usuario (`Iniciales`) | `IdError: true` — *"No se mando usuario de la transaccion."* |
  | Vendedor / Empleado inexistente | `IdError: true` — *"Vendedor o Empleado Inexistente."* |
  | `DescPP`+`DescPP2` combinado > 18% | `IdError: true` — *"Descuentos no pueden exceder al 18%."* |
  | `Vigencia` > 180 | `IdError: true` — *"Vigencia No Autorizada."* |
  | `TipoFactor=FD` y `Factor` > 18 | `IdError: true` — *"Factor de Descuento No Autorizado."* |
  | `TipoFactor=FC` y `Factor` < 10 | `IdError: true` — *"Factor Sobre Costo No Autorizado."* |
  | Artículo inexistente / inactivo | `IdError: true` — *"El articulo no se encuentra en el catalogo o esta inactivo: <id>."* |
  | Artículo descontinuado (`Id-Div=INT`) sin existencia | `IdError: true` — *"El articulo esta descontinuado..."* |
  | Decimales en presentación que no los permite | `IdError: true` — *"No se permiten decimales en esta presentacion: <id>."* |
  | Detalle vacío o importe total en `0` | `IdError: true` — *"No se encontro detalle de cotizaciones o con importe en cero."* |
  | Folio no disponible (50 intentos) | `IdError: true` — *"No se pudo conseguir folio para la cotizacion."* |
  | Todo correcto | `IdError: false`; cotización grabada con folio en `ttCot.IdCot` |

  ---

  ## 10. Regla de Autorización (`Autorizada`)

  El servidor marca la cotización como **No autorizada** (`Autorizada = false`, requiere autorización) cuando se da **cualquiera** de:
  - `TipoPrecio = "MX"` (precios no vigentes)
  - Descuento P.P. combinado entre **>5% y ≤18%**
  - `Vigencia` entre **>15 y ≤180** días
  - `TipoFactor` activo (`FI`, o `FD ≤18`, o `FC ≥10`)
  - Alguna partida con precio especial (`IndicaPre = "*"`)

  En caso contrario, `Autorizada = true`.

  > **Excepción por margen:** si quedó como No autorizada pero el margen global de la cotización (`vtad0100.p`) es **≥ 15%**, el servidor la autoriza automáticamente.

  ---

  ## 11. Reglas de Negocio para el Front

  1. **El front calcula** `PUnit`, `Importe` (`Cant × PUnit` con descuento) e `Iva` por partida y manda también `SubTotal`/`IVA`/`Tot` del encabezado; el servidor **vuelve a sumar** los totales desde las partidas (la fuente de verdad es el detalle).
  2. **Folio y fecha:** para alta nueva enviar `Id-Cot`/`IdCot` **vacíos**; el servidor asigna folio y pone `FecReg = TODAY` (aunque el front mande una fecha).
  3. **Costos:** si `Costo`/`PCosto` van en `0`, el servidor los calcula; el front normalmente los deja en `0`.
  4. **Condiciones:** `TipoPrecio`, `Plazo`, `Vigencia`, `DescPP`, `LAB`, `PrecioTemp` provienen del widget Condiciones (ver servicio de carga de cliente).
  5. **`IndicaPre` por partida:** el front lo fija según cómo se obtuvo el precio (lista, manual, contrato, especial); influye en si la cotización requiere autorización.
  6. **Respuesta:** al recibir `IdError: false`, mostrar el folio (`ttCot.IdCot`) y si quedó `Autorizada` o pendiente de autorización.

  ---

  ## 12. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*

  ---

  ## 13. Fecha de Prueba

  | Ambiente | Fecha         | Ejecutado por |
  |----------|---------------|---------------|
  | DEV      | *(pendiente)* | *(pendiente)* |

  ---

  ## 14. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio existente en `cotizacion2.p`. Pendiente de prueba formal del alta vía REST por QA. |

  ---

  ## 15. Observaciones Técnicas

  1. **Servicio de origen:** el alta vive en `cotizacion2.p` / `creaCotizaciones` (recurso `cot2`). Es el motor canónico; no se duplica la lógica de folio, costos, validaciones ni autorización.
  2. **Dataset `dsCot2`:** `ttCot` (encabezado) + `ttDetCot` (partidas), relacionados por `Id-Cot`. El parámetro es `INPUT-OUTPUT`, por lo que el dataset regresa con el folio y totales asignados.
  3. **Transacción única:** las partidas (`DetCot`) y el encabezado (`Cot`) se graban dentro de un solo `DO TRANSACTION`; si algo falla, no se graba nada.
  4. **Doble nombre de campos:** los temp-tables exponen campos con y sin guion (`Id-Cot`/`IdCot`, `Id-Vendedor`/`IdVendedor`, `Id-color`/`IdColor`, `Id-pres`/`IdPres`, `Id-Moneda`/`IdMoneda`, `Id-Seq`/`IdSeq`). El portal real **envía ambas variantes**; lo importante es que la variante **sin guion** (`IdVendedor`, `IdCliente`, `IdArticulo`, `IdColor`, `IdPres`, `IdMoneda`, `IdSeq`) venga correcta, pues es la que el servidor usa como llave y luego copia a la variante con guion. Enviar ambas (como el portal) es lo más seguro.
  5. **`Id-Fuente = 4`:** el servidor marca la cotización con fuente 4 (canal de captura) y `HorReg = TIME`.
  6. **Autenticación:** servicio sobre OpenEdge PASOE; si el ambiente requiere Bearer, incluir `Authorization: Bearer <token>`.

  ---
  **Desarrollado por:** SIS10 - JASS
