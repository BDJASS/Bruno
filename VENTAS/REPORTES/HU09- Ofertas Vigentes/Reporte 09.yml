docs: |-
  **Reporte  — Consulta de Artículos en Oferta**
  Programa: `ventas-rep010.p` | Basado en: `cnfa0590.p`

  Retorna los artículos registrados en una oferta específica, incluyendo presentación,
  color, porcentajes de descuento, vigencia y estatus activo.

  **Parámetros:**
  - `IdOfer` (string, opcional): Clave de la oferta a consultar. Vacío = todas las ofertas.
    Ej: `ENERO`, `PROMO1`, `VERANO24`

  **Ejemplo — oferta específica:**
  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/OfertasVigentes?IdOfer=enero
  ```

  **Ejemplo — todas las ofertas:**
  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/OfertasVigentes
  ```

  **Campos de respuesta (ttArch):**
  - `IdOfer` — Clave de la oferta
  - `IdArticulo` — Clave del artículo
  - `Descr` — Descripción del artículo en oferta
  - `IdPres` — Clave de presentación
  - `IdColor` — Clave de color (0 = todos los colores)
  - `NomColor` — Abreviatura de color o "TODOS"
  - `PorcMay` — % descuento mayoreo
  - `PorcPro` — % descuento promoción
  - `FecIni` / `FecFin` — Vigencia de la oferta
  - `Contado` — true = solo contado
  - `NoPP` — true = no aplica precio de proveedor
  - `Activo` — true = oferta activa
