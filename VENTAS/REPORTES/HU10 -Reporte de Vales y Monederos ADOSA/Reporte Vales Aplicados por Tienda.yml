docs: |
  # Servicio REST — Vales Aplicados por Tienda

  ---

  ## 1. Título del Servicio

  **Reporte 11B — Vales Aplicados por Ubicación/Tienda**
  Retorna el importe total de vales de mercancía aplicados por tienda (ubicación de venta), separando vales de clientes y vales de empleados.
  Programa servidor: `ventas-rep011.p` | Procedure: `GetValesAplicadosTienda` | Basado en: `vtac2110.p`

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/ValesAplicadosPorTienda
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`FechaInicial`** · DATE · ✅ — Fecha de inicio del periodo de consulta
  - Formato: `YYYY-MM-DD` · Default si nulo: `TODAY`

  **`FechaFinal`** · DATE · ✅ — Fecha de fin del periodo de consulta
  - Formato: `YYYY-MM-DD` · Default si nulo: `TODAY`
  - No puede ser menor que `FechaInicial`

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/ValesAplicadosPorTienda
      ?FechaInicial=2026-01-01
      &FechaFinal=2026-01-30
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "IdError": false,
    "Respuesta": "8 registros encontrados.",
    "dsOutput": {
      "ttValesUbic": [
        {
          "IdUbic": "MTY",
          "Descripcion": "MONTERREY CENTRO",
          "Importe": 45600.00,
          "ImpEmpl": 12300.50
        },
        {
          "IdUbic": "SLT",
          "Descripcion": "SALTILLO",
          "Importe": 28750.25,
          "ImpEmpl": 5400.00
        }
      ]
    }
  }
  ```

  ### Campos de `ttValesUbic`

  **`IdUbic`** · STRING — Clave de la ubicación de venta (tienda)
  **`Descripcion`** · STRING — Nombre/descripción de la ubicación (`Ubivta.Descr`)
  **`Importe`** · DECIMAL — Importe total de vales aplicados por **clientes** (`Remision.Id-Nomina = 0`)
  **`ImpEmpl`** · DECIMAL — Importe total de vales aplicados por **empleados** (`Remision.Id-Nomina <> 0`)

  > Solo se incluyen ubicaciones con `Importe > 0` (al menos un vale de cliente).
  > Las remisiones canceladas (`feccancel <> ?`) se excluyen automáticamente.
  > Se excluyen remisiones que son devoluciones (detectadas vía `numticket` o `foliofiscant` cruzado con `b-Remision`).

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Fecha final no puede ser menor a la inicial, Verifique.",
    "dsOutput": {
      "ttValesUbic": []
    }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Condición | Mensaje de error |
  |-----------|-----------------|
  | `FechaFinal < FechaInicial` | `Fecha final no puede ser menor a la inicial, Verifique.` |

  ---

  ## 10. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*
  Adjuntar screenshot de la herramienta de prueba (Postman / Bruno / curl) mostrando:
  - URL completa con parámetros
  - Status HTTP `200 OK`
  - Cuerpo de respuesta con al menos un registro en `ttValesUbic`

  ---

  ## 11. Fecha de Prueba

  | Ambiente | Fecha      | Ejecutado por |
  |----------|------------|---------------|
  | DEV      | 2026-04-01 | *(pendiente)* |

  ---

  ## 12. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 13. Observaciones Técnicas

  1. **Lógica de exclusión de devoluciones:** Si una remisión tiene `numticket <> ''` o `foliofiscant <> 0`, se busca si existe una remisión original (`b-Remision`) con `FecReg >= FecReg - 30` que coincida por `id-remision/numticket` (tipo 1) o por `foliofiscant` + mismo carácter en posición 7 (tipo 2). Si se encuentra, se omite la remisión (es devolución).
  2. **Detección de vales:** Se buscan en `DetRemis` los registros con `Tipo = 6` y `Descr BEGINS "VALE"`. La clave del vale se extrae como `SUBSTRING(DetRemis.Descr, 8, 12)`.
  3. **Separación cliente vs empleado:** Si `Remision.Id-Nomina = 0` → vale de cliente (`Importe`); si `Id-Nomina <> 0` → vale de empleado (`ImpEmpl`).
  4. **Filtro de ubicaciones:** Solo se retornan ubicaciones donde `Importe > 0` (al menos un vale de cliente). Ubicaciones con solo vales de empleado y cero en clientes se excluyen.
  5. **Descripción de ubicación:** Se obtiene de la tabla `Ubivta` usando `Ubivta.id-ubivta = IdUbic`.
  6. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.
