  > **Estructura del dataset:** `ttDiv` es el nivel padre (resumen por división).
  > Cada elemento de `ttDiv` contiene un arreglo `ttCatego` con las categorías que pertenecen a esa división.
  > La relación es `ttDiv.IdDiv = ttCatego.IdDiv`.

  ### Campos de `ttDiv` *(nivel división — padre)*

  **`IdDiv`** · STRING — Clave de la división
  **`DescrDiv`** · STRING — Descripción de la división
  **`Importe`** · DECIMAL — Importe bruto acumulado de la división
  **`Descto`** · DECIMAL — Descuento pronto pago prorrateado acumulado
  **`PorDes`** · DECIMAL — % de descuento promedio de la división
  **`Neto`** · DECIMAL — Neto de la división (Importe − Descto)
  **`PctNeto`** · DECIMAL — % que representa el neto de esta división sobre el total general
  **`Costo`** · DECIMAL — Costo total de artículos vendidos en la división
  **`Dif`** · DECIMAL — Diferencia (Neto − Costo)
  **`Margen`** · DECIMAL — % de margen sobre costo `((Neto/Costo)−1)×100`

  ### Campos de `ttCatego` *(nivel categoría — hijos anidados en `ttDiv`)*

  **`IdDiv`** · STRING — Clave de la división a la que pertenece
  **`DescrDiv`** · STRING — Descripción de la división
  **`IdCatego`** · STRING — Clave de la categoría
  **`DescrCatego`** · STRING — Descripción de la categoría
  **`Importe`** · DECIMAL — Importe bruto de ventas de la categoría
  **`Descto`** · DECIMAL — Descuento pronto pago prorrateado de la categoría
  **`PorDes`** · DECIMAL — % de descuento promedio de la categoría
  **`Neto`** · DECIMAL — Neto de la categoría (Importe − Descto)
  **`PctNeto`** · DECIMAL — % que representa el neto de esta categoría sobre el total general
  **`Costo`** · DECIMAL — Costo total de la categoría
  **`Dif`** · DECIMAL — Diferencia (Neto − Costo)
  **`Margen`** · DECIMAL — % de margen sobre costo `((Neto/Costo)−1)×100`

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Error: [descripción del error]",
    "dsOutput": {
      "ttDiv": []
    }
  }
  ```

  ---

  ## 9. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*
  Adjuntar screenshot de la herramienta de prueba (Postman / Insomnia / curl) mostrando:
