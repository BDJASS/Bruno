docs: |
  # Servicio REST — Márgenes por Categoría y División

  ---

  ## 1. Título del Servicio

  **Reporte 04 — Márgenes por Categoría y División (s/Costo, sin IVA)**
  Retorna el análisis de márgenes de venta agrupado jerárquicamente: **División → Categorías**.
  El response es un dataset anidado donde cada división contiene sus categorías como hijos directos.
  Programa servidor: `ventas-rep004.p` | Basado en: `vtac1250.p / vtac1250.i`

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/MargenesPorCategoriaDivision
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional · Fechas en formato `YYYY-MM-DD`.

  **`IdUser`** · STRING · ✅ — Usuario que ejecuta el reporte

  **`FechaInicial`** · DATE · ✅ — Fecha inicial del periodo
  - Formato: `YYYY-MM-DD`

  **`FechaFinal`** · DATE · ✅ — Fecha final del periodo
  - Formato: `YYYY-MM-DD`

  **`Seleccionar`** · INT · ✅ — Criterio de selección de clientes/ventas
  - `1` General (todos los clientes)
  - `2` Vendedor (requiere `Lista` = CSV de `Id-Vendedor`)
  - `3` Cliente (requiere `Lista` = CSV de `Id-Cliente`)
  - `4` ListaCte (requiere `Lista` = CSV de `Id-ListaCte`)
  - `5` Contratos vigentes al periodo
  - `6` UbiVta (requiere `Lista` = CSV de `Id-Ubic`)

  **`Lista`** · STRING · ❌ — CSV de códigos según `Seleccionar`
  - Ej: `"001,002"` · Vacío cuando `Seleccionar=1` o `Seleccionar=5`

  **`ConAsociados`** · BOOLEAN · ❌ — Incluir clientes asociados *(solo aplica con `Seleccionar=3`)*
  - `true` = incluye asociados al cliente · `false` = solo el cliente indicado (default)

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header   | Valor              |
  |----------|--------------------|
  | `Accept` | `application/json` |

  ---

  ## 7. Ejemplo de Request

  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/MargenesPorCategoriaDivision
      ?IdUser=olds
      &FechaInicial=2026-02-21
      &FechaFinal=2026-03-23
      &Seleccionar=1
      &Lista=
      &ConAsociados=false
  ```

  **Interpretación del request de ejemplo:**
  - Criterio **General** — incluye todos los clientes sin filtro
  - Periodo del `2026-02-21` al `2026-03-23`
  - Sin desglose de clientes asociados

  ---

  ## 8. Ejemplo de Response

  ```json
