          "PorDes": -2.00,
          "Neto": 500780.00,
          "PctNeto": 63.42,
          "Costo": 382000.00,
          "Dif": 118780.00,
          "Margen": 31.09,
          "ttCatego": [
            {
              "IdDiv": "PAP",
              "DescrDiv": "PAPEL Y DERIVADOS",
              "IdCatego": "010",
              "DescrCatego": "PAPEL BOND",
              "Importe": 511000.00,
              "Descto": 10220.00,
              "PorDes": -2.00,
              "Neto": 500780.00,
