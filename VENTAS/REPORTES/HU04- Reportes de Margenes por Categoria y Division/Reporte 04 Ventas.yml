  ---

  ## 12. Observaciones Técnicas

  1. **Dataset anidado (`NESTED FOREIGN-KEY-HIDDEN`):** El servidor retorna un único objeto `dsOutput` donde `ttCatego` está embebido dentro de cada objeto `ttDiv`. No se devuelven dos arreglos planos separados. La clave de relación (`IdDiv`) se oculta del hijo para evitar duplicidad.
  2. **`PctNeto` en ambos niveles:** Tanto `ttDiv` como `ttCatego` incluyen el campo `PctNeto`, que representa el porcentaje del neto de ese registro sobre el **total general** de todas las divisiones/categorías. Permite comparar el peso relativo a cualquier nivel sin cálculos adicionales en el frontend.
  3. **Cálculo de `Margen`:** Se calcula sobre costo: `((Neto / Costo) − 1) × 100`. Si el costo es `0`, el margen se retorna como `0`.
  4. **Cálculo de `PorDes`:** `(((Importe − Descto) / Importe) − 1) × 100`. Valor negativo indica descuento. Si el importe es `0`, se retorna `0`.
  5. **`Descto` = Descuento pronto pago (FactorPP):** No es el descuento comercial de la línea. Es el descuento de pronto pago prorrateado por línea de detalle usando el factor `(1 − Desc1/SubTot) × (1 − Desc2/Tot)`.
  6. **`Seleccionar=4` (ListaCte) y `Seleccionar=5` (Contratos):** El servidor construye internamente una tabla de clientes elegibles (`t-liscte`) antes de procesar las ventas. `Lista` debe contener los IDs de lista/contrato, no de clientes.
  7. **`ConAsociados=true`:** Solo tiene efecto con `Seleccionar=3`. Amplía el universo de facturas/remisiones al cliente indicado en `Lista` y a todos sus clientes asociados registrados en el catálogo.
  8. **Volumen de datos:** Con `Seleccionar=1` (General) y periodos amplios, el response puede ser extenso. El número de registros se indica en el campo `Respuesta` (ej: `"12 categorias encontradas."`).
