docs: |
  # Servicio REST — Detalle de Documento (Ventas por Vendedor)

  ---

  ## 1. Título del Servicio

  **Detalle de Documento (Factura / Remisión) — Consulta**
  Devuelve el detalle **completo** de una factura o remisión, con todos sus renglones en el orden capturado: artículos y renglones de corte/comentario (`Tipo = 3` o `4`, que no llevan artículo).
  Programa servidor: `ventas-rep006det.p` · Procedimiento: `GetDetalleDocumento` | Complemento del desglose por documentos de `ventas-rep006.p`: ahí `ttDes.TieneCorte = true` indica que el artículo maneja cortes, y con este servicio se consulta el documento cuando el usuario lo pide (los comentarios de corte son textos grandes y no viajan en el desglose).

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/VentasPorProvPorVend/DetalleDocumento
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · Los tres datos vienen en el renglón de `ttDes` del desglose

  **`Folio`** · STRING · ✅ — Folio del documento (`ttDes.IdFactura`; puede ser factura o remisión, el servicio lo detecta)

  **`Fecha`** · DATE · ✅ — Fecha del documento (`ttDes.FecReg`, ISO `aaaa-mm-dd`)

  **`IdCliente`** · STRING (numérico) · ✅ — Cliente del documento (`ttDes.IdCliente`)

  **`IdArticulo`** · STRING · ❌ — Artículo a filtrar (`ttDes.IdArticulo`; se normaliza con ceros a la izquierda: `21118` = `021118`)
  - Con valor: regresa el renglón de ese artículo **y los cortes (Tipo 3/4) que le siguen** en el orden del documento; al iniciar otro artículo la captura termina (los cortes de otros artículos ya no salen)
  - Vacío = documento completo

  **`IdUser`** · STRING · ✅ — Usuario que consulta

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET .../DetalleDocumento?Folio=0123456&Fecha=2026-02-10&IdCliente=55921&IdUser=SIS10                      (documento completo)
  GET .../DetalleDocumento?Folio=22519RE&Fecha=2026-05-04&IdCliente=42707&IdArticulo=021118&IdUser=SIS10    (solo ese articulo + sus cortes)
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "response": {
      "IdError": false,
      "Respuesta": "Factura 0123456: 3 renglon(es).",
      "dsDocumento": {
        "ttDocEnc": [
          {
