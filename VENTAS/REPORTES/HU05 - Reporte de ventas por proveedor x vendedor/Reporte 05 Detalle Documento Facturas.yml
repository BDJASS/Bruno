            "IdCliente": 55921,
            "RazonSocial": "DISTRIBUIDORA DEL VALLE SA DE CV",
            "IdVendedor": "0077",
            "Renglones": 3,
            "ttDocDet": [
              {
                "Folio": "0123456",
                "Orden": 1,
                "Tipo": 1,
                "EsCorte": false,
                "IdArticulo": "010203",
                "DescrArt": "PAPEL BOND CARTA BLANCO",
                "Renglon": "PAPEL BOND CARTA BLANCO",
                "IdColor": 0,
                "Color": "",
                "IdPres": 2,
                "Presentacion": "CAJA",
                "Cant": 10.00,
                "PrecUnit": 850.000000,
                "Descto": 0.00,
                "Importe": 8500.00
              },
              {
                "Folio": "0123456",
                "Orden": 2,
                "Tipo": 3,
                "EsCorte": true,
                "IdArticulo": "",
                "DescrArt": "",
                "Renglon": "CORTE A MEDIA CARTA, EMPACAR EN PAQUETES DE 500",
                "IdColor": 0,
                "Color": "",
                "IdPres": 0,
                "Presentacion": "",
