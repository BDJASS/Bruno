              },
              {
                "Folio": "0123456",
                "Orden": 3,
                "Tipo": 3,
                "EsCorte": true,
                "IdArticulo": "",
                "DescrArt": "",
                "Renglon": "ENTREGAR EN BODEGA 2",
                "IdColor": 0,
                "Color": "",
                "IdPres": 0,
                "Presentacion": "",
                "Cant": 0.00,
