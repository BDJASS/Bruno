    "ttTotales": []
  }
  ```

  ### Error — Usuario no enviado

  ```json
  {
    "IdError": true,
    "Respuesta": "Se requiere usuario (pIdUser).",
    "ttPedidoSP": [],
    "ttTotales": []
  }
  ```

  ### Resultado vacío — Sin pedidos en el año

  ```json
  {
    "IdError": false,
    "Respuesta": "0 pedido(s) de contado sin pago.",
    "ttPedidoSP": [],
    "ttTotales": [
