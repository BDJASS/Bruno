        "NumClientes": 0,
        "Tot": 0.00,
        "TotFac": 0.00
      }
    ]
  }
  ```

  ---

  ## 10. Observaciones Técnicas

  **Definición de "contado EXPO sin pago":** solo se consideran pedidos con
  `Id-Captura = "0104"` (canal EXPO), `Id-Cond = 0` (contado), `Id-Estatus = 5`
  (facturado), `Pagado = FALSE` y `SolCanc = FALSE`. Pedidos cancelados, con
  solicitud de cancelación o ya pagados quedan excluidos.

  **Remisión asociada no pagada:** cuando el pedido tiene `Id-Factura` y `Id-Cond = 0`
  se localiza la `Remision`. Si `Remision.Pagada = TRUE` el pedido **se omite**
  aunque `Pedido.Pagado` sea `FALSE` — el filtro de "sin pago" exige que la
  remisión tampoco esté pagada. `TotFac` toma `Remision.Tot`.

  **Cambio de periodo:** la versión carácter usaba `FechaInicial`/`FechaFinal`
  (DATE). Esta versión REST recibe un único parámetro `Anio` y procesa el año
  completo (`01/01`–`31/12`), derivando internamente `pFecIni` y `pFecFin`.

  **Índice de búsqueda:** la consulta principal usa `USE-INDEX Idx-FecPed`, que
  lidera por `FecReg`, para acotar eficientemente por año. El resultado se ordena
  `BY Id-Cliente BY Tot`.

  **Anticipo disponible (`Acuse`):** se evalúan los `Anticipo` del cliente con
  `Id-Cliente > 11` y `Canc = FALSE`. Si el saldo
  `ImpAnticipo − ImpAplicado − ImpContado` supera el importe a comparar
  (`Remision.Tot` si hay remisión, en otro caso `Pedido.Tot`), se devuelve su
  `Id-Acuse`; en caso contrario `Acuse` queda vacío. Si varios anticipos cumplen,
  se conserva el último evaluado.

  **Pago en EXPO (`PagoExpo` / `FormaPago`):** se busca el primer registro `Expo`
  del pedido con `Pagado = TRUE`. Si existe, `PagoExpo = TRUE` y `FormaPago` se
  traduce desde `Expo.FeFormaPago` (`01`=EFECTIVO, `02`=CHEQUE, `03`=TRANSFERENCIA,
  `04`=TARJETA CRE, `28`=TARJETA DEB). Indica que el cliente pagó en el evento EXPO
  aunque el pedido/remisión aún no refleje el pago en el sistema.

  **Importes con IVA:** tanto `Tot` (total del pedido) como `TotFac` (total
  facturado) se retornan con IVA incluido.

  **Totales siempre presentes:** `ttTotales` siempre devuelve un registro, incluso
  cuando no hay pedidos (todos los importes y conteos en `0`). `NumClientes` cuenta
  clientes distintos mediante la temp-table auxiliar `ttwCte`.

  **Auditoría:** cada ejecución se registra con `programas/auditoria.p` (módulo
  `VENTAS`, acción `Expo`, programa `vtac1374`, método `GET`), incluyendo el conteo
  de pedidos y la fecha inicial del periodo.
