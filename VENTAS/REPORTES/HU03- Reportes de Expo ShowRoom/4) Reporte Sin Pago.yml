docs: |
  # Servicio REST — Pedidos EXPO de Contado sin Pago

  ---

  ## 1. Título del Servicio

  **vtac1374 — Pedidos EXPO de Contado sin Pago**
  Retorna los pedidos EXPO de contado (`Id-Captura = "0104"`, `Id-Cond = 0`) ya
  facturados (estatus `5`) que **no registran pago** (`Pagado = FALSE`) y cuya
  remisión asociada tampoco esté pagada. Por cada pedido incluye su anticipo
  disponible, el indicador de pago en EXPO y la forma de pago. Corresponde a la
  card "Clientes sin Pago" del dashboard EXPO. Importes **con IVA**.
  Retorna detalle por pedido (`ttPedidoSP`) y un registro de totales (`ttTotales`).

  Programa servidor: `vtac1374.p` | Basado en: `vtac1374.p` (modo carácter, FLC 14-Mar-2026)

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Expo/ContadoSinPago
  ```

  **Ejemplo completo:**
  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Expo/ContadoSinPago?IdUser=olds&Anio=2026&Cliente=0
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional · Valores `0` en filtros numéricos = sin filtro (todos).

  **`Anio`** · INT · ✅ — Año a consultar
  - OBLIGATORIO, 4 dígitos (`1000`–`9999`) · Ej: `2026`
  - Procesa el año completo: del `01/01` al `31/12` del año indicado
  - Omitido o `0` → `"Se requiere el año (Anio)."`
  - Fuera de 4 dígitos → `"El año debe ser de 4 dígitos (AAAA), ej: 2026."`

  **`Cliente`** · INT · ❌ — Filtro por cliente
  - `0` = Todos los clientes · `>0` = cliente específico

  **`IdUser`** · STRING · ✅ — Usuario que ejecuta la consulta
  - Vacío o ausente → `"Se requiere usuario (pIdUser)."`

  ---

  ## 5. Lógica del Proceso

  El procedimiento `GetExpoContadoSinPago` trabaja en tres fases internas:

  ### Fase 1 — Validaciones y derivación del periodo
  - Si `pIdUser` está vacío o nulo → error `"Se requiere usuario (pIdUser)."`.
  - Si `pCliente` viene nulo se normaliza a `0` (todos).
  - Si `pAnio` es nulo o `0` → error `"Se requiere el año (Anio)."`.
  - Si `pAnio < 1000` o `pAnio > 9999` → error `"El año debe ser de 4 dígitos (AAAA), ej: 2026."`.
  - El periodo se deriva como año completo:
  ```
  pFecIni = DATE(1, 1, pAnio)     /* 01/01/AAAA */
  pFecFin = DATE(12, 31, pAnio)   /* 31/12/AAAA */
  ```

  ### Fase 2 — Iteración de pedidos EXPO de contado sin pago
  Se recorren los `Pedido` (con `USE-INDEX Idx-FecPed`, que lidera por `FecReg`
  para acotar el año eficientemente) que cumplen **todas** estas condiciones:

  | Condición | Valor exigido |
  |-----------|---------------|
  | `FecReg` | dentro de `pFecIni`–`pFecFin` |
  | `Id-Captura` | `"0104"` (canal EXPO) |
  | `SolCanc` | `FALSE` |
  | `Id-Cond` | `0` (contado) |
  | `Id-Estatus` | `5` (facturado) |
  | `Pagado` | `FALSE` |

  El recorrido se ordena `BY Id-Cliente BY Tot`. Por cada pedido:

  - **Filtro cliente:** si `pCliente > 0` y el pedido no es del cliente → `NEXT`.
  - **Ciudad:** se arma `Ciudad.Nombre + ", " + Estado.NomCto` a partir del `Cliente`.
  - **Entrega:** se obtiene `Entrega.Descr` por `Pedido.Id-Entrega`.
  - **Remisión asociada (clave del filtro de "sin pago"):**
    con `Id-Factura <> ""` e `Id-Cond = 0` se busca la `Remision`. Si existe se toma
    `l-TotFac = Remision.Tot`, y **si `Remision.Pagada = TRUE` el pedido se omite** (`NEXT`).
    Para `Id-Cond > 0` (no aplica al filtro de contado) se tomaría `Factura.Tot`.
  - **Anticipo disponible (`Acuse`):** se recorren los `Anticipo` del cliente
    (`Id-Cliente > 11`, `Canc = FALSE`); si el saldo
    `ImpAnticipo − ImpAplicado − ImpContado` supera el importe a comparar
    (`Remision.Tot` si hay remisión, en otro caso `Pedido.Tot`), se guarda `Anticipo.Id-Acuse`.
  - **Pago en EXPO (`PagoExpo` / `FormaPago`):** se busca `FIRST Expo` con
    `Id-Pedido` del pedido y `Pagado = TRUE`. Si existe, `PagoExpo = TRUE` y se
    traduce `FeFormaPago`:
  ```
  "01" → EFECTIVO       "04" → TARJETA CRE     "28" → TARJETA DEB
  "03" → TRANSFERENCIA  "02" → CHEQUE
  ```
  - Se crea el registro `ttPedidoSP` y se acumulan `l-Subt += Pedido.Tot` y
    `l-TTotFac += l-TotFac`. El cliente se registra una sola vez en `ttwCte`
    (tabla auxiliar para contar clientes distintos).

  ### Fase 3 — Totales y auditoría
  - Se crea el único registro `ttTotales` con:
  ```
  NumPedidos  = número de pedidos incluidos
  NumClientes = clientes distintos (conteo de ttwCte)
  Tot         = Σ Pedido.Tot
  TotFac      = Σ TotFac (remisión/factura)
  ```
  - Se registra auditoría vía `programas/auditoria.p` (módulo `VENTAS` / `Expo`).
  - Respuesta de éxito: `"<n> pedido(s) de contado sin pago."`.

  ---

  ## 6. Response — Campos de ttPedidoSP

  > Un registro por pedido de contado EXPO sin pago.

  **`Renglon`** · INTEGER — Consecutivo del renglón (1, 2, 3, …)
  **`IdPedido`** · STRING — Clave del pedido (`Id-Pedido`)
  **`Resto`** · INTEGER — Resto/parcialidad del pedido
  **`FecReg`** · DATE — Fecha de registro del pedido
  **`Tot`** · DECIMAL(2) — Total del pedido con IVA
  **`IdCliente`** · INTEGER — Id del cliente
  **`RazonSocial`** · STRING — Razón social del pedido
  **`Ciudad`** · STRING — Ciudad y estado (`Ciudad.Nombre, Estado.NomCto`)
  **`IdEntrega`** · INTEGER — Id de la condición/forma de entrega
  **`Entrega`** · STRING — Descripción de la entrega (`Entrega.Descr`)
  **`Pagado`** · BOOLEAN — `true` = pedido pagado; `false` = sin pago (siempre `false` en contado)
  **`IdFactura`** · STRING — Clave de la factura/remisión asociada
  **`FecFac`** · DATE — Fecha de facturación
  **`TotFac`** · DECIMAL(2) — Total facturado con IVA (remisión o factura)
  **`Acuse`** · STRING — Id-Acuse del anticipo que alcanza a cubrir el documento (vacío si ninguno)
  **`PagoExpo`** · BOOLEAN — `true` = existe pago registrado en módulo EXPO; `false` = no
  **`FormaPago`** · STRING — Forma de pago EXPO (`EFECTIVO`, `TARJETA CRE`, `TARJETA DEB`, `TRANSFERENCIA`, `CHEQUE`)

  ---

  ## 7. Response — Campos de ttTotales

  > Siempre retornado. Un único registro con los totales del periodo.

  **`NumPedidos`** · INTEGER — Cantidad de pedidos de contado sin pago incluidos
  **`NumClientes`** · INTEGER — Cantidad de clientes distintos
  **`Tot`** · DECIMAL(2) — Suma de `Tot` de todos los pedidos (con IVA)
  **`TotFac`** · DECIMAL(2) — Suma de `TotFac` de todos los pedidos (con IVA)

  ---

  ## 8. Response — Campos estándar

  **`IdError`** · BOOLEAN — `false` = proceso exitoso; `true` = ocurrió un error
  **`Respuesta`** · STRING — Mensaje descriptivo (`"<n> pedido(s) de contado sin pago."` en éxito, o el mensaje de error)

  ---

  ## 9. Ejemplos de Respuesta

  ### Éxito — Con pedidos

