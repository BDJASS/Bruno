docs: |-
  # Servicio REST — Pedidos EXPO acumulado por Proveedor

  ---

  ## 1. Título del Servicio

  **Pedidos EXPO acumulado por Proveedor (ExpoPorProveedor)**
  Retorna, dentro de un rango de fechas, un renglón por **proveedor** con el número de renglones de pedido capturados, el subtotal pedido (sin IVA) y el subtotal facturado (sin IVA), más un registro de **totales** generales. Es el detalle de la card **"Total de Proveedores"** del dashboard EXPO. Solo considera pedidos con captura EXPO (`Id-Captura = "0104"`), no cancelados.
  Programa servidor: `vtac1371.p` | Basado en: `vtac1371.p` (FLC, 7-Mar-2025)

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Expo/PorProveedor
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`FechaInicial`** · DATE · ❌ — Inicio del rango (formato `YYYY-MM-DD`)
  - Default si se omite: `2026-03-06` (inicio EXPO 2026)

  **`FechaFinal`** · DATE · ❌ — Fin del rango (formato `YYYY-MM-DD`)
  - Default si se omite: fecha de hoy (`TODAY`)

  **`IdUser`** · STRING · ✅ — Usuario que ejecuta la consulta (auditoría)
  - Ej: `"olds"` · Si falta → `IdError: true`

  > ℹ️ Esta card se abre desde el grid principal `/Ventas/Expo/Pedidos`. El front **debe usar las MISMAS `FechaInicial` y `FechaFinal`** que tenga aplicadas el dashboard EXPO, para que los totales cuadren con la card.

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Expo/PorProveedor
      ?FechaInicial=2026-03-06&FechaFinal=2026-06-12&IdUser=olds
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "IdError": false,
    "Respuesta": "37 proveedor(es) con pedidos EXPO.",
    "dsExpoProveedor": {
      "ttProveedor": [
        {
          "Renglon": 1,
          "IdProv": 1801,
          "NomProv": "GRUPO SCRIBE SA DE CV",
          "NumReng": 142,
          "SubTotal": 985430.50,
          "SubTotFac": 612300.00
        },
        {
          "Renglon": 2,
          "IdProv": 905,
          "NomProv": "BIC DE MEXICO SA DE CV",
          "NumReng": 88,
          "SubTotal": 543120.75,
          "SubTotFac": 543120.75
        }
      ],
      "ttTotales": [
        {
          "NumProveedores": 37,
          "NumReng": 1024,
          "SubTotal": 8451230.40,
          "SubTotFac": 6120880.10
        }
      ]
    }
  }
  ```

  ### Campos de `ttProveedor`

  > Un renglón por proveedor. Ordenado por `SubTotal` descendente.

  **`Renglon`** · INT — Número de renglón consecutivo (1, 2, 3…); refleja el orden por subtotal descendente
  **`IdProv`** · INT — Clave del proveedor (`DetPedido.Id-Prov`)
  **`NomProv`** · STRING — Nombre del proveedor (`Prov.Nombre`); vacío si no se encuentra el proveedor
  **`NumReng`** · INT — Número de renglones de pedido capturados para el proveedor
  **`SubTotal`** · DECIMAL — Importe pedido sin IVA (suma de `DetPedido.Importe`)
  **`SubTotFac`** · DECIMAL — Importe facturado sin IVA (suma de `DetRemis.Importe` / `DetFactura.Importe` ligado al pedido)

  ### Campos de `ttTotales`

  > Siempre un único registro con los acumulados generales.

  **`NumProveedores`** · INT — Total de proveedores incluidos (= cantidad de renglones en `ttProveedor`)
  **`NumReng`** · INT — Suma total de renglones de pedido de todos los proveedores
  **`SubTotal`** · DECIMAL — Suma total del importe pedido sin IVA
  **`SubTotFac`** · DECIMAL — Suma total del importe facturado sin IVA

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Se requiere usuario (pIdUser).",
    "dsExpoProveedor": {
      "ttProveedor": [],
      "ttTotales": []
    }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Condición | Comportamiento |
  |-----------|----------------|
  | `IdUser` vacío o no enviado | `IdError: true` — `"Se requiere usuario (pIdUser)."` |
  | `FechaInicial` mayor que `FechaFinal` | `IdError: true` — `"La fecha inicial es mayor a la fecha final."` |
  | `FechaInicial` no enviada | Se asume `2026-03-06` (inicio EXPO) |
  | `FechaFinal` no enviada | Se asume la fecha de hoy |
  | Renglón de pedido con `Id-Prov = 0` (sin proveedor asignado) | Se **excluye** de `ttProveedor` y de los totales |
  | Proveedor sin pedidos EXPO en el rango | No aparece |
  | Error en proceso | `IdError: true` — `"Error en EXPO por proveedor: <mensaje>"` |

  ---

  ## 10. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*
  Adjuntar screenshot de la herramienta de prueba (Bruno / Postman / curl) mostrando:
  - URL completa con `FechaInicial`, `FechaFinal` e `IdUser`
  - Status HTTP `200 OK`
  - Cuerpo de respuesta con al menos un registro en `ttProveedor` y el registro de `ttTotales`

  ---

  ## 11. Fecha de Prueba

  | Ambiente | Fecha      | Ejecutado por |
  |----------|------------|---------------|
  | DEV      | 2026-06-14 | *(pendiente)* |

  ---

  ## 12. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 13. Observaciones Técnicas

  1. **Relación con el dashboard:** Este servicio alimenta la card **"Total de Proveedores"** del dashboard EXPO. Se abre desde el grid principal `/Ventas/Expo/Pedidos`; el front debe enviar las **mismas** `FechaInicial`/`FechaFinal` del dashboard para que `NumProveedores`, `SubTotal` y `SubTotFac` cuadren con lo mostrado en la pantalla principal.
  2. **Renglones sin proveedor:** Los renglones de pedido con `Id-Prov = 0` (sin proveedor asignado) se **excluyen por completo**: no generan renglón en `ttProveedor` ni suman a `ttTotales`. Por ello la suma del servicio puede diferir del total bruto del pedido cuando existen renglones sin proveedor.
  3. **Filtro de pedidos:** Solo se consideran pedidos con `Id-Captura = "0104"` (captura EXPO) y `SolCanc = FALSE`. Para el subtotal pedido se exige además `Resto = 0`.
  4. **Facturado (`SubTotFac`):** Se cruza cada pedido con su documento de facturación según `Id-Cond`: si `Id-Cond = 0` se usa **Remisión** (`DetRemis`), de lo contrario **Factura** (`DetFactura`). Se descartan remisiones/facturas canceladas (con `FecCanc` y sin documento de reemplazo) y renglones con `CantFac <= 0`. El cruce liga `RengPed` con el renglón del pedido validando artículo, color y presentación.
  5. **Orden de salida:** `ttProveedor` se entrega ordenado por `SubTotal` descendente; el campo `Renglon` refleja ese orden (1 = proveedor con mayor importe pedido).
  6. **Totales:** `ttTotales` siempre trae un único registro. `NumProveedores` equivale a la cantidad de renglones de `ttProveedor`; los demás campos son las sumas acumuladas.
  7. **Mensaje OK:** En éxito, `Respuesta` = `"<N> proveedor(es) con pedidos EXPO."` donde `<N>` es el número de proveedores incluidos.
  8. **Auditoría:** Cada ejecución registra una entrada de auditoría (`programas/auditoria.p`) con módulo `VENTAS`, evento `Expo`, programa `vtac1371`.
  9. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.
