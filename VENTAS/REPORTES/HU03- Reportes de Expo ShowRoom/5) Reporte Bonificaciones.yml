docs: |
  # Servicio REST — Bonificaciones EXPO a cargo del Proveedor

  ---

  ## 1. Título del Servicio

  **Bonificaciones EXPO a cargo del Proveedor**
  Calcula la bonificación (reembolso) que cada proveedor debe cubrir por los descuentos
  EXPO de un año completo: la diferencia entre el costo normal (`HCosto`) y el costo
  promocional resultante de aplicar el descuento del proveedor (`DescProv`) o la
  excepción por lista `EEXPO26`. Considera tanto pedidos EXPO (Id-Captura `0104`) como
  ventas EXPO directas (tabla `Expo`). Retorna detalle por artículo (`ttBonifDet`),
  resumen por proveedor (`ttBonifProv`) y un total general (`ttTotales`). Todos los
  montos son SIN IVA. Es el reporte de la card "Total de Bonificaciones" del dashboard EXPO.

  Programa servidor: `vtac1375.p` | Basado en: `vtac1375.p` (FLC, 05-Abr-2025)

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Expo/Bonificaciones
  ```

  **Ejemplo completo:**
  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Expo/Bonificaciones?IdUser=olds&Anio=2026&Proveedor=0&Cliente=0
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional · Valores `0` en filtros numéricos = sin filtro (todos).

  **`Anio`** · INT · ✅ — Año a consultar
  - OBLIGATORIO, 4 dígitos (rango `1000`–`9999`) · Ej: `2026`
  - Procesa el año completo: del `01/01` al `31/12`
  - Omitido o `0` → `"Se requiere el año (Anio)."`
  - No es de 4 dígitos → `"El año debe ser de 4 dígitos (AAAA), ej: 2026."`

  **`Proveedor`** · INT · ❌ — Filtro por proveedor
  - `0` = Todos los proveedores · `>0` = proveedor específico

  **`Cliente`** · INT · ❌ — Filtro por cliente
  - `0` = Todos los clientes · `>0` = cliente específico

  **`IdUser`** · STRING · ✅ — Usuario que ejecuta la consulta
  - Vacío o ausente → `"Se requiere usuario (pIdUser)."`

  ---

  ## 5. Lógica del Proceso

  El procedimiento `GetExpoBonificaciones` trabaja en cuatro fases internas:

  ### Fase 1 — Pre-carga de excepciones por artículo (listas EEXPO26)
  Se leen todas las listas cuyo nombre (`ListaArt.Descrip`) inicia con `EEXPO26`
  junto con su detalle (`DetListaArt`). Para cada artículo se extrae el porcentaje
  de descuento especial codificado en el nombre de la lista: los 2 dígitos en la
  posición `LENGTH(TRIM(Descrip)) - 4`.
  Ejemplo: lista `EEXPO26-30X` → descuento de `30 %` para los artículos que la integran.

  Estos descuentos tienen **prioridad** sobre el descuento general del proveedor.

  ### Fase 2 — Acumular partidas de PEDIDOS EXPO
  Se recorren todos los `Pedido` con `USE-INDEX Idx-FecPed` (que lidera por `FecReg`,
  para acotar el barrido al año solicitado) con:
  - `FecReg` entre `01/01` y `31/12` del año
  - `Id-Captura = "0104"` (canal EXPO)
  - `Resto = 0` y `SolCanc = FALSE`

  Por cada renglón de detalle (`DetPedido`) se aplican estos pasos:

  | Paso | Condición de exclusión |
  |------|------------------------|
  | Filtro cliente | `pCliente > 0` y pedido no es del cliente → `NEXT` |
  | Filtro proveedor | `pProveedor > 0` y renglón no es del proveedor → `NEXT` |
  | Sin descuento vigente | No existe `DescProv` activo en `FecReg` del pedido → `NEXT` |

  **Costo normal (`NCosto`):**
  Se busca el `HCosto` más reciente del artículo/proveedor con `FecReg ≤ 01/01` del año.
  Si no existe, se toma el más antiguo posterior a esa fecha (fallback).
  ```
  NCosto = HCosto.Costo × ArtPres.Equiv
  ```

  **Porcentaje de descuento (`PDesc`):**
  ```
  PDesc = ttwExcep.PDesc   (si el artículo tiene excepción EEXPO26)
          DescProv.Descto  (en otro caso)
  ```

  **Costo promoción:**
  ```
  Costo = NCosto × (1 − PDesc / 100)
  ```

  Las partidas se acumulan en la temp-table de trabajo `ttwDatos`, agrupadas por
  `IdProv + IdArticulo + IdColor + IdPres`. La cantidad se suma por cada coincidencia
  (`Cant += DetPedido.CantPed`).

  ### Fase 3 — Acumular ventas EXPO directas (tabla Expo)
  Misma lógica de la Fase 2 aplicada a las ventas EXPO sin pedido:
  - `Expo` con `FecReg` dentro del año, `Cancelado = FALSE` e `Id-Pedido = ""`
  - Detalle en `DetExpo`; filtros de cliente/proveedor y validación de descuento idénticos
  - Las cantidades (`DetExpo.CantPed`) se acumulan en los mismos registros `ttwDatos`

  ### Fase 4 — Generar detalle, resumen y total
  Se recorre `ttwDatos` con `BREAK BY IdProv BY IdArticulo BY IdColor` y por cada
  registro se calcula:
  ```
  BonifUnit (l-DescUnit) = NCosto − Costo
  Valor     (l-Valor)    = BonifUnit × Cant
  PorcBonif (l-Porc)     = (NCosto ≠ 0) ? BonifUnit / NCosto × 100 : 0
  ```
  Se crea un renglón en `ttBonifDet` por combinación y se acumula el subtotal del
  proveedor. En `LAST-OF(IdProv)` se crea el registro de `ttBonifProv` con ese subtotal.
  Al final se crea el único registro de `ttTotales` con el conteo de proveedores,
  conteo de artículos y la suma total de bonificación. La operación se registra en
  `programas/auditoria.p`.

  ---

  ## 6. Response — Campos de ttBonifDet

  > Detalle por artículo. Un registro por combinación Proveedor / Artículo / Color / Presentación.

  **`Renglon`** · INTEGER — Consecutivo único del renglón de detalle
  **`IdProv`** · INTEGER — Id del proveedor
  **`NomProv`** · STRING — Nombre del proveedor (`Prov.Nombre`)
  **`IdArticulo`** · STRING — Clave del artículo
  **`Descr`** · STRING — Descripción del artículo (`Articulo.Descr`)
  **`AbrevColor`** · STRING — Abreviatura del color (`Kolor.Abrev`); vacío = sin color
  **`Cant`** · DECIMAL(2) — Cantidad total de piezas en el periodo (acumulada)
  **`Pres`** · STRING — Descripción de la presentación (`ArtPres.Descr`)
  **`CostoNormal`** · DECIMAL(2) — Costo normal: `HCosto.Costo × ArtPres.Equiv` (sin IVA)
  **`CostoPromo`** · DECIMAL(2) — Costo con descuento: `CostoNormal × (1 − PDesc/100)` (sin IVA)
  **`BonifUnit`** · DECIMAL(2) — Bonificación unitaria: `CostoNormal − CostoPromo`
  **`PorcBonif`** · DECIMAL(2) — Porcentaje de bonificación: `BonifUnit / CostoNormal × 100`
  **`Valor`** · DECIMAL(2) — Bonificación total sin IVA: `BonifUnit × Cant`

  ---

  ## 7. Response — Campos de ttBonifProv

  > Resumen por proveedor. Un registro por proveedor.

  **`Renglon`** · INTEGER — Consecutivo único del renglón de resumen
  **`IdProv`** · INTEGER — Id del proveedor
  **`NomProv`** · STRING — Nombre del proveedor (`Prov.Nombre`)
  **`Valor`** · DECIMAL(2) — Total de bonificación del proveedor en el periodo (sin IVA)

  ---

  ## 8. Response — Campos de ttTotales

  > Un único registro con los totales generales de la consulta.

  **`NumProveedores`** · INTEGER — Número de proveedores con bonificación
  **`NumArticulos`** · INTEGER — Número de renglones de detalle (artículos)
  **`TotBonificacion`** · DECIMAL(2) — Suma total de bonificación de todos los proveedores (sin IVA)

  ---

  ## 9. Response — Campos estándar

  **`IdError`** · BOOLEAN — `false` = proceso exitoso; `true` = ocurrió un error
  **`Respuesta`** · STRING — Mensaje descriptivo (resumen en éxito, o mensaje de error)

  ---

  ## 10. Ejemplos de Respuesta

