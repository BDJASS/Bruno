  ```

  ---

  ## 11. Observaciones Técnicas

  **Periodo por año completo:** El servicio reemplazó los parámetros `FechaInicial` /
  `FechaFinal` (DATE) por un único parámetro `Anio` (INTEGER). Internamente deriva
  `pFecIni = DATE(1,1,Anio)` y `pFecFin = DATE(12,31,Anio)`, procesando siempre el
  año completo del `01/01` al `31/12`.

  **Búsqueda acotada por índice:** La iteración de pedidos usa `USE-INDEX Idx-FecPed`,
  que lidera por `FecReg`, para acotar eficientemente el barrido al año solicitado.

  **Pedidos EXPO:** Solo se consideran pedidos con `Id-Captura = "0104"`, `Resto = 0`
  y `SolCanc = FALSE`. Pedidos cancelados o con resto pendiente quedan excluidos.

  **Ventas EXPO directas:** Además de los pedidos, se incluyen las ventas EXPO directas
  (tabla `Expo`) con `Cancelado = FALSE` e `Id-Pedido = ""` (ventas sin pedido asociado).
  Sus cantidades se acumulan en los mismos registros de trabajo que los pedidos.

  **Costo normal (HCosto):** Se usa el `HCosto` más reciente del artículo/proveedor con
  `FecReg ≤ 01/01` del año. Si no existe registro anterior, se toma el más antiguo
  posterior (fallback). Si tampoco existe, `NCosto = 0` y el renglón genera `Valor = 0`.
  El costo se multiplica por `ArtPres.Equiv` para expresarlo en la presentación.

  **Listas EEXPO26:** Los artículos incluidos en listas cuyo nombre comienza con
  `EEXPO26` tienen un descuento especial que **sobreescribe** el porcentaje de
  `DescProv`. El porcentaje se lee de los 2 caracteres del nombre de la lista en la
  posición `LENGTH(TRIM(Descrip)) - 4` (Ej.: `EEXPO26-30X` → `30 %`).

  **Sin descuento vigente:** Si no existe un `DescProv` activo en la fecha del
  documento (`FecIni ≤ FecReg ≤ FecFin`), el renglón se omite completamente.

  **Agrupación:** Los documentos del mismo proveedor / artículo / color / presentación
  se acumulan en un solo registro de detalle, sumando las cantidades de pedidos y
  ventas directas.

  **Sin IVA:** Todos los importes de bonificación (`CostoNormal`, `CostoPromo`,
  `BonifUnit`, `Valor`, `TotBonificacion`) se calculan sin IVA.

  **Mensaje OK:** Al terminar sin error, `Respuesta` regresa
  `"<N> proveedor(es) con bonificacion."`, donde `<N>` es `ttTotales.NumProveedores`.

  **Auditoría:** Cada ejecución registra la operación en `programas/auditoria.p` con
  módulo `VENTAS`, acción `Expo`, programa `vtac1375` y método `GET`.

  **Manejo de errores:** Cualquier excepción `Progress.Lang.Error` se captura y se
  devuelve como `IdError: true` con `Respuesta = "Error en bonificaciones EXPO: <detalle>"`.
