    ## 12. Observaciones Técnicas

    1. **Fechas en URL:** Deben enviarse en formato `YYYY-MM-DD`. El AppServer OpenEdge las convierte automáticamente a tipo `DATE`.
    2. **Parámetro `Lista`:** Solo requerido cuando `Selectivo=1`. Cuando `Selectivo=2` puede omitirse o enviarse vacío (`Lista=`).
    3. **Modo resumido vs. detallado:** Con `Reporte=1` el servicio omite el llenado de `ttDetalle` para optimizar el tiempo de respuesta. Usar `Reporte=2` únicamente cuando se necesite desglose por documento.
    4. **Margen sobre costo vs. sobre venta:**
       - `Margen=1` → `((Neto - Costo) / Costo) * 100`
       - `Margen=2` → `((Neto - Costo) / Neto) * 100`
    5. **Clientes excluidos:** El reporte excluye automáticamente clientes internos (`Id-Cliente <= 10`) excepto el `Id-Cliente = 3` (Público General / Mostrador).
    6. **Filtros de valor `0`:** Todos los parámetros de filtro numérico con valor `0` son ignorados (equivalente a "sin filtro").
    7. **Subdistribuidores (`SubDist=2`):** Filtra solo clientes marcados como subdistribuidores en el catálogo de clientes.
    8. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.
