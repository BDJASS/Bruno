    # Servicio REST — Márgenes por Cliente

    ---

    ## 1. Título del Servicio

    **Reporte 01 — Márgenes por Cliente**
    Retorna el análisis de márgenes de venta agrupado por cliente, con opción de detalle por factura/remisión.
    Programa servidor: `ventas-rep001.p` | Basado en: `vtac0090.p`

    ---

    ## 2. Método HTTP

    ```
    GET
    ```

    ---

    ## 3. URL Completa

    ```
    http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/MargenesPorCliente
    ```

    ---

    ## 4. Parámetros de Entrada (Query String)

    > ✅ = Requerido · ❌ = Opcional · Valores `0` en filtros numéricos = sin filtro.

    **`FechaInicial`** · DATE · ✅ — Fecha inicial del periodo
    - Formato: `YYYY-MM-DD`

    **`FechaFinal`** · DATE · ✅ — Fecha final del periodo
    - Formato: `YYYY-MM-DD`

    **`Reporte`** · INT · ✅ — Tipo de reporte
    - `1` Resumido · `2` Detallado (incluye `ttDetalle`)

    **`IdUser`** · STRING · ✅ — Usuario que ejecuta el reporte

    **`Zonas`** · INT · ✅ — Ubicación geográfica del cliente
    - `1` General · `2` Local · `3` Foráneo

    **`Condicion`** · INT · ✅ — Tipo de venta
    - `1` Todos · `2` Contado · `3` Crédito

    **`Ordenado`** · INT · ✅ — Orden de la salida
    - `1` Alfabético · `2` Ventas descendente

    **`SubDist`** · INT · ✅ — Filtro subdistribuidores
    - `1` General · `2` Solo subdistribuidores

    **`Seleccionar`** · INT · ✅ — Criterio de selección de clientes
    - `1` Gral · `2` Zona · `3` Resp · `4` Vend · `5` Agente · `6` Ruta · `7` Giro · `8` Cliente · `9` ListaCte · `10` Contratos

    **`Selectivo`** · INT · ✅ — Modo de aplicación del criterio
    - `1` Selectivo (usa `Lista`) · `2` Todos

    **`Lista`** · STRING · ❌ — CSV de códigos según `Seleccionar`
    - Ej: `"001,002"` · Vacío cuando `Selectivo=2`

    **`Margen`** · INT · ✅ — Base de cálculo del margen
    - `1` Sobre costo · `2` Sobre venta

    **`ImporteVentas`** · DECIMAL · ✅ — Importe mínimo de ventas para incluir cliente
    - `0` = todos

    **`DescPP1`** · DECIMAL · ✅ — Filtro mínimo descuento pronto pago 1
    - Rango: `0.00` – `100.00` · `0` = sin filtro

    **`DescPP2`** · DECIMAL · ✅ — Filtro mínimo descuento pronto pago 2
    - Rango: `0.00` – `100.00` · `0` = sin filtro

    **`PlazoCredito`** · INT · ✅ — Filtro plazo de crédito mínimo (días)
    - `0` = sin filtro

    **`PlazoPPP`** · INT · ✅ — Filtro plazo pago puntual mínimo (días)
    - `0` = sin filtro

    **`Factor`** · DECIMAL · ✅ — Filtro factor fijo de descuento mínimo
    - Rango: `0.00` – `1.00` · `0` = sin filtro

    **`PorcFlete`** · DECIMAL · ✅ — Filtro porcentaje de flete mínimo
    - Rango: `0.00` – `100.00` · `0` = sin filtro

    **`DesCtdo`** · DECIMAL · ✅ — Filtro descuento contado mínimo
    - Rango: `0.00` – `100.00` · `0` = sin filtro

    **`DiasPromedio`** · DECIMAL · ✅ — Filtro días promedio de pago mínimo
    - `0` = sin filtro

    **`DiasCartera`** · DECIMAL · ✅ — Filtro días promedio de cartera mínimo
    - `0` = sin filtro

    ---

    ## 5. Body

    No aplica. Método `GET`.

    ---

    ## 6. Headers

    | Header          | Valor                        |
    |-----------------|------------------------------|
    | `Accept`        | `application/json`           |
    | `Content-Type`  | `application/json` *(opcional en GET)* |

    ---

    ## 7. Ejemplo de Request

    ```
    GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/MargenesPorCliente
        ?FechaInicial=2026-02-21
        &FechaFinal=2026-03-23
        &Reporte=1
        &IdUser=olds
        &Zonas=1
        &Condicion=1
        &Ordenado=1
        &SubDist=1
        &Seleccionar=1
        &Selectivo=2
        &Margen=1
        &ImporteVentas=0
        &DescPP1=0
        &DescPP2=0
        &PlazoCredito=0
        &PlazoPPP=0
        &Factor=0
        &PorcFlete=0
        &DesCtdo=0
        &DiasPromedio=0
        &DiasCartera=0
    ```

    ---

    ## 8. Ejemplo de Response

    ```json
    {
      "IdError": false,
      "Respuesta": "OK",
      "dsOutput": {
        "ttMargen": [
          {
            "IdCliente": 1025,
            "RazSoc": "DISTRIBUIDORA EJEMPLO SA DE CV",
            "Iniciales": "JGR",
            "Sel": "NORTE",
            "IdZona": 3,
            "Limite": 50000,
            "Plazo": 30,
            "Factor": 0.0,
            "FletePag": false,
            "DesCtdo": 2.0,
            "DescPP1": "2.5,1.5",
            "DPromPago": 28.4,
            "DPromCart": 32.1,
            "Importe": 148250.00,
            "Descto": 7412.50,
            "PorDes": 5.00,
            "Neto": 140837.50,
            "Costo": 112670.00,
            "Dif": 28167.50,
            "ImpFlete": 0.00,
            "Margen": 19.99
          }
        ],
        "ttDetalle": []
      }
    }
    ```

    > **Nota:** `ttDetalle` solo contiene registros cuando `Reporte=2` (modo detallado).
    > Cuando `Reporte=1` (resumido), `ttDetalle` se retorna vacío.

    ### Campos de `ttMargen`

    **`IdCliente`** · INT — Clave del cliente
    **`RazSoc`** · STRING — Razón social
    **`Iniciales`** · STRING — Iniciales del vendedor asignado
    **`Sel`** · STRING — Etiqueta del criterio de selección (zona, giro, etc.)
    **`IdZona`** · INT — Clave de zona del cliente
    **`Limite`** · INT — Límite de crédito
    **`Plazo`** · INT — Plazo de crédito en días
    **`Factor`** · DECIMAL — Factor fijo de descuento
    **`FletePag`** · BOOLEAN — `true` = cliente paga flete
    **`DesCtdo`** · DECIMAL — Porcentaje de descuento contado
    **`DescPP1`** · STRING — Descuentos pronto pago en formato `"pp1,pp2"`
    **`DPromPago`** · DECIMAL — Días promedio de pago (1 decimal)
    **`DPromCart`** · DECIMAL — Días promedio de cartera (1 decimal)
    **`Importe`** · DECIMAL — Importe bruto de ventas del periodo
    **`Descto`** · DECIMAL — Total de descuentos aplicados
    **`PorDes`** · DECIMAL — Porcentaje de descuento promedio
    **`Neto`** · DECIMAL — Importe neto (Importe − Descto)
    **`Costo`** · DECIMAL — Costo total de los artículos vendidos
    **`Dif`** · DECIMAL — Diferencia Neto − Costo
    **`ImpFlete`** · DECIMAL — Importe de flete cargado
    **`Margen`** · DECIMAL — % de margen según parámetro `Margen` (sobre costo o sobre venta)

    ### Campos de `ttDetalle` *(solo cuando `Reporte=2`)*

    **`IdCliente`** · INT — Clave del cliente
    **`IdFactura`** · STRING — Número de factura o remisión
    **`FecReg`** · DATE — Fecha del documento
    **`Factor`** · STRING — `"F"` si se aplicó precio factor; vacío si no
    **`FletePag`** · BOOLEAN — `true` = documento incluye flete
    **`Importe`** · DECIMAL — Importe bruto del documento
    **`Descto`** · DECIMAL — Descuento aplicado
    **`PorDes`** · DECIMAL — Porcentaje de descuento
    **`Neto`** · DECIMAL — Neto del documento
    **`Costo`** · DECIMAL — Costo de los artículos del documento
    **`Dif`** · DECIMAL — Diferencia Neto − Costo
    **`ImpFlete`** · DECIMAL — Importe de flete del documento
    **`Margen`** · DECIMAL — % de margen del documento

    ### Response de error controlado

    ```json
    {
      "IdError": true,
      "Respuesta": "Error: [descripción del error]",
      "dsOutput": {
        "ttMargen": [],
        "ttDetalle": []
      }
    }
    ```

    ---

