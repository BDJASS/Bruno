  ---

  ## 12. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 13. Observaciones Técnicas

  1. **Flujo de implementación en el front:**
     1. El grid se pobló con la llamada de `GridGeneral` (`Reporte=1`).
     2. Al hacer clic en **DETALLE** de un renglón, tomar el `IdCliente` de ese renglón.
     3. Llamar este servicio con `Reporte=2&Seleccionar=8&Selectivo=1&SeleccionarLista=<IdCliente>` y **las mismas** `FechaInicial`, `FechaFinal` y `Margen` del grid.
     4. Pintar `ttDetalle` en el panel/modal de detalle.
  2. **Relleno a 6 dígitos:** El backend normaliza cada entrada de `SeleccionarLista` a 6 dígitos con ceros a la izquierda (el catálogo compara `Id-Cliente` como cadena `999999`). El front **no** necesita formatear la clave.
  3. **Por qué deben coincidir fechas y margen:** El servicio recalcula todo el periodo en cada llamada; no hay caché entre la llamada del grid y la del detalle. Periodos o base de margen distintos producen totales distintos.
  4. **Varios clientes:** `SeleccionarLista` acepta CSV (`575,1025`) por si el front implementa detalle multi-selección; `ttDetalle` regresa los documentos de todos, distinguibles por `IdCliente`.
  5. **Rendimiento:** `Reporte=2` con un solo cliente en `SeleccionarLista` es rápido — el desglose se limita a los documentos de ese cliente. No usar `Reporte=2` sin filtrar cliente.
  6. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.
