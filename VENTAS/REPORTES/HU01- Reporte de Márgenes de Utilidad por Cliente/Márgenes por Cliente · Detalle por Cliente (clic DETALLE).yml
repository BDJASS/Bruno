  > **Para cuadrar contra el grid:** la suma de `Importe` / `Descto` / `Neto` /
  > `Costo` de los registros de `ttDetalle` corresponde al renglón del cliente en
  > `ttMargen` (y al renglón mostrado en el grid si se respetaron fechas y margen).

  ### Campos de `ttDetalle` (1 registro por factura/remisión del cliente)

  **`IdCliente`** · INT — Clave del cliente
  **`IdFactura`** · STRING — Número de factura o remisión
  **`FecReg`** · DATE — Fecha del documento
  **`Factor`** · STRING — `"F"` si se aplicó precio factor; vacío si no
  **`FletePag`** · BOOLEAN — `true` = documento incluye flete
  **`Importe`** · DECIMAL — Importe bruto del documento
  **`Descto`** · DECIMAL — Descuento aplicado
  **`PorDes`** · DECIMAL — Porcentaje de descuento
  **`Neto`** · DECIMAL — Neto del documento
  **`Costo`** · DECIMAL — Costo de los artículos del documento
  **`Dif`** · DECIMAL — Diferencia Neto − Costo
  **`ImpFlete`** · DECIMAL — Importe de flete del documento
  **`Margen`** · DECIMAL — % de margen del documento (misma base que el parámetro `Margen`)

  ### Campos de `ttMargen`

  Mismos campos que en el modo grid — ver `ventas-rep001-MargenesPorCliente-GridGeneral.md`.
  En este modo retorna **solo el cliente** (o clientes) de `SeleccionarLista`.

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Enviar Usuario",
    "dsOutput": {
      "ttMargen": [],
      "ttDetalle": []
    }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Condición | Comportamiento |
  |-----------|----------------|
  | `IdUser` vacío o no enviado | `IdError: true` — `"Enviar Usuario"` |
  | `SeleccionarLista` con menos de 6 dígitos | El backend completa con ceros (`575` → `000575`) |
  | `SeleccionarLista` con varios clientes | Cada entrada del CSV se completa a 6 dígitos por separado |
  | Cliente inexistente o sin ventas en el periodo | Retorna `ttMargen: []` y `ttDetalle: []` con `IdError: false` |
  | `Reporte=1` por error | `ttDetalle` regresa vacío — para detalle debe ser `2` |
  | `Seleccionar` distinto de `8` | La lista no se interpreta como clientes (otros criterios) |

  ---

  ## 10. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*
  Adjuntar screenshot de la herramienta de prueba (Bruno / Postman / curl) mostrando:
  - URL completa con parámetros
  - Status HTTP `200 OK`
  - Cuerpo de respuesta con el cliente en `ttMargen` y sus documentos en `ttDetalle`

  ---

  ## 11. Fecha de Prueba

  | Ambiente | Fecha      | Ejecutado por |
  |----------|------------|---------------|
