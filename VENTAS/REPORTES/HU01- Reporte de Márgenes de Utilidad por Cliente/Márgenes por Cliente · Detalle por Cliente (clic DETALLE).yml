docs: |-
  # Servicio REST — Márgenes por Cliente · Detalle por Cliente (clic DETALLE)

  ---

  ## 1. Título del Servicio

  **Reporte 01 — Márgenes por Cliente (modo Detalle por Cliente)**
  Llamada que se dispara al hacer clic en **DETALLE** sobre un renglón del grid general: retorna en `ttDetalle` el desglose por factura/remisión del cliente seleccionado, y en `ttMargen` el renglón resumen de ese mismo cliente.
  Programa servidor: `ventas-rep001.p` | Basado en: `vtac0090.p`

  > 📌 La llamada del grid general está documentada en
  > `ventas-rep001-MargenesPorCliente-GridGeneral.md` (mismo endpoint, otros parámetros).

  > ⚠️ **REGLA DE ORO:** `FechaInicial`, `FechaFinal` y `Margen` deben enviarse con
  > **exactamente los mismos valores** usados para poblar el grid general. Si cambia
  > cualquiera de los tres, las cifras del detalle **no van a cuadrar** con el renglón
  > del grid.

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/MargenesPorCliente
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`FechaInicial`** · DATE · ✅ — Fecha inicial del periodo
  - Formato: `YYYY-MM-DD` · **Misma fecha usada en el grid**

  **`FechaFinal`** · DATE · ✅ — Fecha final del periodo
  - Formato: `YYYY-MM-DD` · **Misma fecha usada en el grid**

  **`Reporte`** · INT · ✅ — Tipo de reporte
  - Para el detalle enviar siempre `2` (Detallado — llena `ttDetalle`)

  **`IdUser`** · STRING · ✅ — Usuario que ejecuta el reporte
  - Ej: `"olds"`

  **`Seleccionar`** · INT · ✅ — Criterio de selección
  - Para el detalle por cliente enviar siempre `8` (Cliente)

  **`Selectivo`** · INT · ✅ — Modo de aplicación del criterio
  - Para el detalle por cliente enviar siempre `1` (Selectivo)

  **`SeleccionarLista`** · STRING · ✅ — Clave del cliente seleccionado en el grid
  - Enviar el `IdCliente` del renglón **tal cual**, sin formatear
  - El backend lo completa con ceros a la izquierda a 6 dígitos (`575` → `000575`)
  - Admite varios clientes separados por coma: `575,1025`

  **`Margen`** · INT · ❌ — Base de cálculo del margen
  - `1` Sobre costo · `2` Sobre venta
  - Si se omite, el servicio asume `1` · **Mismo valor usado en el grid**

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Reporte/MargenesPorCliente
      ?FechaInicial=2026-05-12
      &FechaFinal=2026-06-11
      &Reporte=2
      &IdUser=olds
      &Margen=1
      &Seleccionar=8
      &Selectivo=1
      &SeleccionarLista=575
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
    "IdError": false,
    "Respuesta": "OK",
    "dsOutput": {
