        }
      ],
      "ttDetalle": [
        {
          "IdCliente": 575,
          "IdFactura": "2100739",
          "FecReg": "2026-05-28",
          "Factor": "",
          "FletePag": false,
          "Importe": 11250.25,
          "Descto": 562.51,
