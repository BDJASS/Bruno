  ### Campos de `ttEncabezado` (1 registro)

  **`IdFactura`** · STRING — Número de factura/remisión consultado (7 posiciones)
  **`EsRemision`** · BOOLEAN — `false` = el documento es Factura; `true` = es Remisión
  **`FecReg`** · DATE — Fecha de registro del documento
  **`IdVendedor`** · STRING — Clave del vendedor
  **`NomVendedor`** · STRING — Nombre del empleado vendedor; vacío si no se localizó
  **`IdCliente`** · INT — Clave del cliente
  **`RazonSocial`** · STRING — Razón social registrada en el documento
  **`Ciudad`** · STRING — Ciudad del cliente; vacío si no se localizó
  **`Estado`** · STRING — Estado (nombre corto); vacío si no se localizó
  **`Pedido`** · STRING — Pedido(s) origen del documento (puede ser lista separada por comas)
  **`AutPedido`** · STRING — Quién autorizó el pedido; vacío si no aplica
  **`IdCotizacion`** · STRING — Cotización origen (vía el pedido); vacío si no aplica
  **`AutCotizacion`** · STRING — Quién autorizó la cotización; vacío si no aplica

  ### Campos de `ttDetalle` (1 registro por partida)

  **`Renglon`** · INT — Consecutivo de la partida (orden del documento)
  **`IdArticulo`** · STRING — Clave del artículo
  **`Descr`** · STRING — Descripción de la partida
  **`AbrevColor`** · STRING — Abreviatura del color (tabla `Kolor`); vacío si la partida no tiene color
  **`Pres`** · STRING — Descripción de la presentación; vacío si no se localizó
  **`Tipo`** · INT — Tipo de partida; `1` = Artículo
  **`Cant`** · DECIMAL — Cantidad facturada
  **`Costo`** · DECIMAL — Costo unitario (6 decimales)
  **`Descto`** · DECIMAL — Porcentaje de descuento de la partida
  **`PrecUnit`** · DECIMAL — Precio unitario **neto** (ya con el descuento aplicado, 6 decimales)
  **`IndicaPre`** · STRING — Indicador de precio
  **`Margen`** · DECIMAL — Margen de la partida (%); `100` cuando el costo es `0`

  > ⚠️ El reporte de modo carácter solo imprime las cifras (`Cant`, `Costo`, `Descto`, `PrecUnit`, `IndicaPre`, `Margen`) cuando `Tipo = 1`. El servicio retorna los valores de todas las partidas; el front debe replicar ese comportamiento mostrando cifras únicamente cuando `Tipo = 1` (las demás partidas son textos/leyendas).

  ### Campos de `ttResumen` (1 registro)

  > Valores **sin IVA** (costos/precios) · Pagos/descuentos/devoluciones **con IVA** en cartera

  **`CostoTotal`** · DECIMAL — Costo total del documento (Σ costo × cantidad)
  **`PrecioFactura`** · DECIMAL — Precio facturado (Σ precio neto × cantidad)
  **`DesctoIncluido`** · DECIMAL — Descuento incluido; solo aplica en remisiones, `0` en facturas
  **`MargenBruto`** · DECIMAL — Margen bruto de venta (%)
  **`Pagos`** · DECIMAL — Pagos aplicados (cartera para facturas, caja para remisiones)
  **`Desctos`** · DECIMAL — Descuentos otorgados en el pago
  **`Devoluciones`** · DECIMAL — Devoluciones aplicadas
  **`PorcDescPago`** · DECIMAL — Porcentaje de descuento en el pago (%); `0` si no hay pagos
  **`MargenNeto`** · DECIMAL — Margen neto (%) — **no contempla pago de comisiones**

  ### Response de error controlado

  ```json
  {
    "IdError": true,
    "Respuesta": "Factura cancelada.",
    "dsMargenFactura": {
      "ttEncabezado": [],
      "ttDetalle": [],
      "ttResumen": []
    }
  }
  ```

  ---

  ## 9. Validaciones del Servicio

  | Condición | Comportamiento |
  |-----------|----------------|
  | `IdUser` vacío o no enviado | `IdError: true` — `"Se requiere usuario (pIdUser)."` |
  | `Factura` vacío o no enviado | `IdError: true` — `"Se requiere el numero de factura (pFactura)."` |
  | `Factura` con menos de 7 dígitos | Se completa con ceros a la izquierda (`739` → `0000739`) |
  | Factura no existe | Busca como **remisión**; si tampoco existe: `"Factura inexistente."` |
  | Factura/remisión cancelada | `IdError: true` — `"Factura cancelada."` |
  | Documento sin pagos en cartera | `PorcDescPago = 0` (no se calcula la división) |
  | Costo total = 0 | `MargenBruto` y `MargenNeto` = `100` |

  ---

  ## 10. Evidencia de Ejecución

  *Pendiente de captura por parte del equipo de QA.*
  Adjuntar screenshot de la herramienta de prueba (Bruno / Postman / curl) mostrando:
  - URL completa con parámetros
  - Status HTTP `200 OK`
  - Cuerpo de respuesta con `ttEncabezado`, `ttDetalle` y `ttResumen` poblados

  ---

  ## 11. Fecha de Prueba

  | Ambiente | Fecha      | Ejecutado por |
  |----------|------------|---------------|
  | DEV      | 2026-06-11 | *(pendiente)* |

  ---

  ## 12. Resultado

  | Estado              | Descripción                                                       |
  |---------------------|-------------------------------------------------------------------|
  | ⏳ Pendiente prueba | Servicio desplegado en DEV. Pendiente de ejecución formal por QA. |

  ---

  ## 13. Observaciones Técnicas

  1. **Factura o remisión:** El servicio primero busca el número en la tabla `Factura`; si no existe, lo busca en `Remision`. El campo `EsRemision` del encabezado indica cuál se encontró. La estructura de la respuesta es idéntica en ambos casos.
  2. **Cálculo del margen por partida:** `PrecUnit = PrecioUnitario × (1 − Descto/100)`; `Margen = (PrecUnit / Costo − 1) × 100`. Cuando el costo de la partida es `0`, el margen se reporta como `100`.
  3. **Pagos en cartera (facturas):** Se acumulan de `MovCliente` + `HistMovCte` por `RefSaldo`: tipos de movimiento `57-62`, `90`, `96` = pagos; `63`, `64`, `66`, `68` = descuentos; `65` = devoluciones.
  4. **Pagos en caja (remisiones):** Se acumulan de `MovCaja`/`DetMovC` por referencia y fecha de la remisión, con los mismos rangos de tipo de pago. El `DesctoIncluido` proviene del descuento de la remisión y se resta del precio antes de calcular los márgenes.
  5. **Margen neto:** `MargenNeto = ((PrecioFactura × (1 − PorcDescPago/100)) / CostoTotal − 1) × 100`. No contempla pago de comisiones (misma leyenda del reporte original).
  6. **Guardas de división entre cero:** A diferencia del programa de modo carácter, el servicio no truena cuando no hay pagos (`PorcDescPago = 0`) ni cuando el costo total es `0` (márgenes = `100`).
  7. **Auditoría:** Cada ejecución se registra vía `programas/auditoria.p` con el usuario recibido en `IdUser`.
  8. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.
