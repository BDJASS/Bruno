docs: |-
  # Servicio REST — Consulta de Margen de Factura

  ---

  ## 1. Título del Servicio

  **Consulta de Margen de Factura detallado (MargenFactura)**
  Recibe un número de factura (o remisión) y retorna los datos generales del documento, el detalle de partidas con margen por artículo, y un resumen con totales, pagos aplicados en cartera/caja y margen bruto/neto.
  Programa servidor: `vtab0060.p` | Basado en: `vtab0060.p` (modo carácter, FLC 23-Feb-2001)

  ---

  ## 2. Método HTTP

  ```
  GET
  ```

  ---

  ## 3. URL Completa

  ```
  http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Consulta/MargenFactura
  ```

  ---

  ## 4. Parámetros de Entrada (Query String)

  > ✅ = Requerido · ❌ = Opcional

  **`Factura`** · STRING · ✅ — Número de factura o remisión a consultar
  - Se completa automáticamente con ceros a la izquierda a 7 posiciones
  - Ej: `2100739` · `739` se convierte en `0000739`

  **`IdUser`** · STRING · ✅ — Usuario que ejecuta la consulta (auditoría)
  - Ej: `"olds"`

  ---

  ## 5. Body

  No aplica. Método `GET`.

  ---

  ## 6. Headers

  | Header         | Valor                                  |
  |----------------|----------------------------------------|
  | `Accept`       | `application/json`                     |
  | `Content-Type` | `application/json` *(opcional en GET)* |

  ---

  ## 7. Ejemplo de Request

  ```
  GET http://192.0.1.14:8853/RestADOSAVentas/rest/RestADOSAVentas/Ventas/Consulta/MargenFactura
      ?IdUser=olds&Factura=2100739
  ```

  ---

  ## 8. Ejemplo de Response

  ```json
  {
