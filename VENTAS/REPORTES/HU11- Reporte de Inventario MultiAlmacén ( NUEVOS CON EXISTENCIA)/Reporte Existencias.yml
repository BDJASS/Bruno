  ## 13. Observaciones Técnicas

  1. **Parámetros fijos:** Este servicio es una versión sin filtros del reporte de existencias multialmacén. Si se requieren filtros (por proveedor, grupo, marca, categoría, etc.), usar el servicio parametrizable `/Ventas/Reporte/InventarioMultiAlmacen` (`ventas-rep002.p`).
  2. **Unidades UMI:** Todas las existencias se devuelven convertidas a la presentación UMI del artículo (`Ex* = existencia / ArtPres.Equiv`). El campo `UnidDesc` indica la unidad.
  3. **CEDIS agrupado:** `Ex02B` suma los almacenes `02B`, `02A` y `02C`. El resto de almacenes son individuales; los no mapeados caen en `ExOtro`.
  4. **Tránsito:** `Transito` incluye requisiciones surtidas en camino (`DetReq` + `ReqAlm` + `EstPedido` con estatus < 7) y traspasos enviados aún no recibidos (`DetSTrasp` sin entrada registrada). Se suma a `ExTotal`.
  5. **Indicadores min/máx:** `+` cuando la existencia supera el máximo configurado por 20% (`> Maximo × 1.20`); `-` cuando está por debajo del mínimo; vacío en rango normal. Se calculan **antes** de la conversión a UMI.
  6. **Giro vía proveedor:** El giro proviene del proveedor del artículo (`Prov.Id-Giro → Giro`), no de un campo directo del artículo.
  7. **Rendimiento:** El servicio recorre todos los artículos activos tipo `N`; el nombre del proveedor se resuelve con caché interno para no golpear `Prov` por cada renglón. Aun así es un barrido completo de catálogo — conviene que el front lo consuma con un indicador de carga.
  8. **Autenticación:** El servicio corre sobre OpenEdge PASOE. Si el ambiente requiere autenticación Bearer, incluir el header `Authorization: Bearer <token>`.
